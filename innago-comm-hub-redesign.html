<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innago — Communication Hub (Responsive)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1B2B2A;
  --ink-secondary: #5A6B6A;
  --ink-tertiary: #8A9695;
  --ink-faint: #B3BDB9;
  --surface: #F6F4F0;
  --surface-warm: #EDE9E3;
  --card: #FFFFFF;
  --card-raised: #FFFFFF;
  --border: #DDD8D0;
  --border-light: #EBE7E1;
  --primary: #2D5A47;
  --primary-light: #3A7A5F;
  --primary-bg: #E8F0EB;
  --primary-bg-subtle: #F0F6F2;
  --landlord-bubble: #1B2B2A;
  --tenant-bubble: #F0EDE8;
  --chip-chat: #3B4EC4;
  --chip-chat-bg: #ECEFFE;
  --chip-email: #0E6B7A;
  --chip-email-bg: #E0F0F3;
  --chip-sms: #7C3AED;
  --chip-sms-bg: #F1ECFE;
  --chip-post: #9A3412;
  --chip-post-bg: #FEF0E5;
  --chip-system: #5A6B6A;
  --chip-system-bg: #EDEBE7;
  --label-maintenance: #B45309;
  --label-maintenance-bg: #FEF3E0;
  --label-billing: #3B4EC4;
  --label-billing-bg: #ECEFFE;
  --label-lease: #2D5A47;
  --label-lease-bg: #E8F0EB;
  --label-system: #5A6B6A;
  --label-system-bg: #EDEBE7;
  --ai-bg: #F0F6F2;
  --ai-border: #B3D4C0;
  --ai-accent: #2D5A47;
  --status-open: #C53030;
  --status-open-bg: #FDE8E8;
  --status-pending: #B45309;
  --status-pending-bg: #FEF3E0;
  --status-closed: #2D5A47;
  --status-closed-bg: #E8F0EB;
  --shadow-sm: 0 1px 2px rgba(27,43,42,0.04);
  --shadow-md: 0 2px 8px rgba(27,43,42,0.06), 0 1px 2px rgba(27,43,42,0.04);
  --shadow-lg: 0 4px 20px rgba(27,43,42,0.08);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--surface);
  height: 100vh;
  overflow: hidden;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-tertiary); }

/* ============================================ */
/* LAYOUT                                       */
/* ============================================ */
.hub { display: flex; height: 100vh; position: relative; }

.col1 {
  width: 288px; flex-shrink: 0;
  background: var(--card);
  border-right: 1px solid var(--border-light);
  display: flex; flex-direction: column;
  z-index: 2;
}

.col2 {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  background: var(--surface);
  z-index: 1;
}

.col3 {
  width: 320px; flex-shrink: 0;
  background: var(--surface-warm);
  border-left: 1px solid var(--border-light);
  overflow-y: auto; height: 100vh;
  z-index: 3;
}

/* Drawer mode */
.col3-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(27,43,42,0.25);
  z-index: 99; opacity: 0; transition: opacity 0.2s;
  backdrop-filter: blur(2px);
}
.col3-backdrop.visible { display: block; opacity: 1; }

/* Back + context toggle */
.back-btn {
  display: none; background: none; border: none;
  cursor: pointer; padding: 8px; margin-right: 4px;
  color: var(--ink); flex-shrink: 0;
}
.ctx-toggle {
  display: none; background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm); cursor: pointer;
  padding: 6px 8px; color: var(--ink-secondary); flex-shrink: 0;
}
.ctx-toggle:hover { background: var(--surface); color: var(--ink); }
.drawer-close {
  position: absolute; top: 16px; right: 16px;
  background: none; border: none; cursor: pointer;
  color: var(--ink-tertiary); padding: 4px; z-index: 5;
}
.drawer-close:hover { color: var(--ink); }

/* ============================================ */
/* COL 1 — INBOX                                */
/* ============================================ */
.col1-header {
  padding: 24px 18px 14px;
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
}

.col1-title {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 20px; font-weight: 600;
  color: var(--ink); margin-bottom: 14px;
  letter-spacing: -0.02em;
}

.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 11px; top: 10px; color: var(--ink-tertiary); }
.search-input {
  background: var(--surface);
  border: 1px solid transparent;
  border-radius: var(--radius-xl);
  padding: 9px 14px 9px 34px;
  font-size: 13px; color: var(--ink);
  width: 100%; font-family: inherit;
  transition: all 0.15s;
}
.search-input::placeholder { color: var(--ink-tertiary); }
.search-input:focus {
  outline: none;
  border-color: var(--primary);
  background: var(--card);
  box-shadow: 0 0 0 3px rgba(45,90,71,0.08);
}

.filter-tabs {
  display: flex; margin-top: 14px; gap: 2px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-tabs::-webkit-scrollbar { display: none; }
.filter-tab {
  padding: 6px 13px; font-size: 12px; font-weight: 500;
  color: var(--ink-secondary); cursor: pointer;
  border: none; background: none;
  border-radius: var(--radius-xl);
  font-family: inherit; transition: all 0.15s;
  white-space: nowrap; flex-shrink: 0;
  letter-spacing: 0.01em;
}
.filter-tab.active {
  color: var(--primary);
  background: var(--primary-bg);
  font-weight: 600;
}
.filter-tab:hover:not(.active) {
  color: var(--ink);
  background: var(--surface);
}

.conv-list { flex: 1; overflow-y: auto; padding: 6px 0; }

.conv-card {
  padding: 14px 18px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.12s;
  margin: 0;
  position: relative;
}
.conv-card:hover { background: var(--surface); }
.conv-card.selected {
  background: var(--primary-bg-subtle);
  border-left-color: var(--primary);
}
.conv-card + .conv-card {
  border-top: 1px solid var(--border-light);
}
.conv-card .row { display: flex; align-items: flex-start; gap: 11px; }

.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; color: #fff;
  overflow: hidden; position: relative;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.online-dot {
  width: 9px; height: 9px;
  background: #34C759; border-radius: 50%;
  border: 2px solid var(--card);
  position: absolute; bottom: -1px; right: -1px;
}
.unread-dot {
  width: 7px; height: 7px;
  background: var(--primary); border-radius: 50%;
  flex-shrink: 0;
}

.card-name {
  font-size: 13.5px; font-weight: 600;
  color: var(--ink); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  letter-spacing: -0.01em;
}
.card-meta {
  font-size: 11.5px; color: var(--ink-tertiary);
  margin-top: 2px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.card-preview {
  font-size: 12px; color: var(--ink-secondary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 5px; display: flex; align-items: center; gap: 6px;
  line-height: 1.4;
}
.card-time {
  font-size: 11px; color: var(--ink-tertiary);
  white-space: nowrap; flex-shrink: 0;
  font-weight: 500;
}

.chip {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: var(--radius-sm);
  letter-spacing: 0.04em; text-transform: uppercase;
  flex-shrink: 0;
}
.chip-chat { background: var(--chip-chat-bg); color: var(--chip-chat); }
.chip-email { background: var(--chip-email-bg); color: var(--chip-email); }
.chip-sms { background: var(--chip-sms-bg); color: var(--chip-sms); }
.chip-post { background: var(--chip-post-bg); color: var(--chip-post); }
.chip-system { background: var(--chip-system-bg); color: var(--chip-system); }

.label-chip {
  display: inline-flex; font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: var(--radius-sm);
  text-transform: uppercase; letter-spacing: 0.04em;
  margin-top: 7px;
}
.label-maintenance { background: var(--label-maintenance-bg); color: var(--label-maintenance); }
.label-billing { background: var(--label-billing-bg); color: var(--label-billing); }
.label-lease { background: var(--label-lease-bg); color: var(--label-lease); }
.label-system { background: var(--label-system-bg); color: var(--label-system); }

.new-msg-btn {
  background: var(--primary); color: #fff;
  font-size: 13px; font-weight: 600;
  padding: 11px; border-radius: var(--radius-md);
  cursor: pointer; text-align: center;
  border: none; width: 100%; font-family: inherit;
  letter-spacing: 0.01em;
  transition: background 0.15s;
}
.new-msg-btn:hover { background: var(--primary-light); }
.col1-footer {
  padding: 14px 18px;
  border-top: 1px solid var(--border-light);
  flex-shrink: 0;
}

/* ============================================ */
/* COL 2 HEADER                                 */
/* ============================================ */
.col2-header {
  background: var(--card);
  border-bottom: 1px solid var(--border-light);
  padding: 18px 28px;
  flex-shrink: 0;
}
.header-top {
  display: flex; align-items: center;
  justify-content: space-between; gap: 14px;
}
.header-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.header-name {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 17px; font-weight: 600;
  color: var(--ink); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  letter-spacing: -0.02em;
}
.header-status {
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: var(--radius-xl);
  background: var(--primary-bg); color: var(--primary);
  flex-shrink: 0;
}
.header-sub {
  font-size: 12px; color: var(--ink-secondary);
  margin-top: 4px; display: flex; align-items: center; gap: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.header-online { color: #34C759; font-weight: 500; }
.header-offline { color: var(--ink-tertiary); }

.btn-secondary {
  background: var(--card); color: var(--ink);
  font-size: 12.5px; font-weight: 500;
  padding: 8px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); cursor: pointer;
  font-family: inherit; white-space: nowrap;
  transition: all 0.12s;
}
.btn-secondary:hover { background: var(--surface); border-color: var(--ink-faint); }
.btn-primary {
  background: var(--ink); color: #fff;
  font-size: 12.5px; font-weight: 500;
  padding: 8px 16px; border-radius: var(--radius-sm);
  border: none; cursor: pointer;
  font-family: inherit; white-space: nowrap;
  transition: background 0.12s;
}
.btn-primary:hover { background: #2A3E3D; }

.overflow-menu {
  display: none; background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm); cursor: pointer;
  padding: 7px 10px; color: var(--ink-secondary);
  font-size: 16px; font-weight: 600; line-height: 1;
  font-family: inherit;
}
.overflow-menu:hover { background: var(--surface); }

.email-meta-row {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--border-light);
}
.email-subject {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 16px; font-weight: 600;
  color: var(--ink); margin-bottom: 4px;
  letter-spacing: -0.01em;
}
.email-fromto {
  font-size: 12px; color: var(--ink-secondary);
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.encrypted-badge {
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: var(--radius-sm);
  background: var(--primary-bg); color: var(--primary);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.sms-phone { font-size: 14px; color: var(--ink); font-weight: 500; margin-top: 4px; }
.sms-optin {
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: var(--radius-xl);
  background: var(--primary-bg); color: var(--primary);
  display: inline-flex; align-items: center; gap: 4px;
}
.post-title {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 18px; font-weight: 600;
  color: var(--ink); margin-bottom: 4px;
  letter-spacing: -0.02em;
}
.post-author { font-size: 12px; color: var(--ink-secondary); }
.post-audience {
  display: inline-flex; font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: var(--radius-xl);
  background: var(--chip-sms-bg); color: var(--chip-sms);
  margin-top: 6px;
}

/* ============================================ */
/* COL 2 BODY                                   */
/* ============================================ */
.col2-body { flex: 1; overflow-y: auto; padding: 24px 28px; }

.date-divider {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 22px;
}
.date-divider span {
  font-size: 11px; color: var(--ink-tertiary);
  font-weight: 600; letter-spacing: 0.08em;
  white-space: nowrap;
}
.date-divider::before,.date-divider::after {
  content:''; flex:1; height:1px; background: var(--border-light);
}

.bubble-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 18px; }
.bubble-row.landlord { flex-direction: row-reverse; }
.bubble-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  flex-shrink: 0; display: flex; align-items: center;
  justify-content: center; font-size: 11px; font-weight: 600;
  color: #fff; overflow: hidden;
}
.bubble-avatar img { width: 100%; height: 100%; object-fit: cover; }

.bubble {
  padding: 13px 18px; font-size: 14px; line-height: 1.6;
}
.bubble.tenant {
  background: var(--tenant-bubble); color: var(--ink);
  border-radius: 4px 18px 18px 18px; max-width: 75%;
}
.bubble.landlord {
  background: var(--landlord-bubble); color: #fff;
  border-radius: 18px 4px 18px 18px; max-width: 75%;
}
.bubble.sms-tenant {
  background: var(--tenant-bubble); color: var(--ink);
  border-radius: 4px 18px 18px 18px; max-width: 60%;
}
.bubble.sms-landlord {
  background: var(--landlord-bubble); color: #fff;
  border-radius: 18px 4px 18px 18px; max-width: 60%;
}
.bubble-time {
  font-size: 11px; color: var(--ink-tertiary);
  margin-top: 5px; display: flex; align-items: center; gap: 4px;
}
.bubble-row.landlord .bubble-time { justify-content: flex-end; }

.typing-indicator {
  display: flex; align-items: center; gap: 8px;
  margin-left: 46px; margin-bottom: 16px;
}
.typing-dots {
  display: flex; gap: 4px; padding: 8px 14px;
  background: var(--tenant-bubble); border-radius: var(--radius-xl);
}
.typing-dots span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--ink-tertiary); animation: typing 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,60%,100%{transform:translateY(0);opacity:.5} 30%{transform:translateY(-3px);opacity:1} }

.system-event { text-align: center; margin: 18px 0; }
.system-event span {
  font-size: 11px; font-weight: 600; color: var(--ink-secondary);
  background: var(--surface-warm); padding: 5px 14px;
  border-radius: var(--radius-xl); letter-spacing: 0.02em;
}
.delivery-delivered { color: #34C759; }
.delivery-failed { color: var(--status-open); }
.retry-btn {
  font-size: 11px; color: var(--status-open); font-weight: 500;
  background: none; border: none; cursor: pointer;
  text-decoration: underline; font-family: inherit;
}

/* Email thread */
.email-thread { display: flex; flex-direction: column; gap: 3px; }
.email-card {
  background: var(--card); border: 1px solid var(--border-light);
  border-radius: var(--radius-md); overflow: hidden;
}
.email-card:last-child {
  border-color: var(--border);
  box-shadow: var(--shadow-md);
}
.email-card-collapsed {
  padding: 11px 18px; display: flex; align-items: center;
  cursor: pointer; gap: 12px; height: 46px;
}
.email-card-collapsed:hover { background: var(--surface); }
.email-sender-col {
  display: flex; align-items: center; gap: 8px;
  width: 160px; flex-shrink: 0;
}
.email-sender-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600; color: #fff; flex-shrink: 0;
}
.email-card-sender {
  font-size: 13px; font-weight: 500; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.email-card-preview {
  font-size: 13px; color: var(--ink-tertiary);
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.email-card-time { font-size: 11px; color: var(--ink-tertiary); white-space: nowrap; flex-shrink: 0; }
.email-card-attach-icon { color: var(--ink-tertiary); flex-shrink: 0; display: flex; }
.email-card-expanded { padding: 22px 26px; }
.email-expanded-header {
  display: flex; align-items: flex-start;
  justify-content: space-between; margin-bottom: 18px;
}
.email-expanded-sender { font-size: 14px; font-weight: 600; color: var(--ink); }
.email-expanded-email { font-size: 12px; color: var(--ink-tertiary); margin-top: 1px; }
.email-expanded-time { font-size: 12px; color: var(--ink-tertiary); }
.email-body-text { font-size: 14px; line-height: 1.75; color: var(--ink-secondary); }
.email-body-text p { margin-bottom: 12px; }
.email-body-text p:last-child { margin-bottom: 0; }

.attachment-row { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
.attachment-card {
  border: 1px solid var(--border-light); border-radius: var(--radius-md);
  padding: 10px 14px; display: flex; align-items: center;
  gap: 10px; background: var(--surface);
  min-width: 160px; flex: 1; max-width: 260px; cursor: pointer;
  transition: all 0.12s;
}
.attachment-card:hover { background: var(--surface-warm); border-color: var(--border); }
.att-icon {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.att-icon.img { background: #FEF3C7; }
.att-icon.pdf { background: #FDE8E8; }
.att-name { font-size: 12px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.att-size { font-size: 11px; color: var(--ink-tertiary); }

.email-quoted {
  margin-top: 16px; padding: 12px 16px;
  border-left: 3px solid var(--border);
  color: var(--ink-tertiary); font-size: 13px;
  line-height: 1.5; cursor: pointer;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.email-quoted:hover { background: var(--surface); color: var(--ink-secondary); }

.email-reply-bar {
  display: flex; align-items: center; justify-content: center;
  padding: 14px; margin-top: 10px;
}
.email-reply-btn {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; font-weight: 500; color: var(--ink);
  background: var(--card); border: 1px solid var(--border);
  padding: 9px 22px; border-radius: var(--radius-xl);
  cursor: pointer; font-family: inherit;
  transition: all 0.12s;
}
.email-reply-btn:hover { background: var(--surface); border-color: var(--ink-faint); }
.email-chevron {
  transition: transform 0.2s; color: var(--ink-tertiary);
  flex-shrink: 0; display: flex;
}
.email-chevron.open { transform: rotate(180deg); }

/* Post */
.post-content-card {
  background: var(--card); border: 1px solid var(--border-light);
  border-radius: var(--radius-lg); padding: 28px;
  margin-bottom: 18px;
  box-shadow: var(--shadow-sm);
}
.post-body { font-size: 14px; line-height: 1.75; color: var(--ink-secondary); }
.post-body p { margin-bottom: 13px; }
.post-body p:last-child { margin-bottom: 0; }
.post-body strong { font-weight: 600; color: var(--ink); }

.read-receipt-section {
  background: var(--card); border: 1px solid var(--border-light);
  border-radius: var(--radius-lg); padding: 20px 24px;
  box-shadow: var(--shadow-sm);
}
.read-receipt-text { font-size: 14px; font-weight: 600; color: var(--ink); }
.read-receipt-sub { font-size: 12px; color: var(--ink-secondary); margin-top: 2px; }
.remind-all-btn {
  font-size: 12px; font-weight: 500; color: var(--ink);

// === BUILD COL 1 CARDS ===
function buildCards(){

      :c.channel==='post'?`<div class="avatar" style="background:#9A3412"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="1.5"><path d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/></svg></div>`
      :c.channel==='system'?`<div class="avatar" style="background:var(--surface-warm)"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#5A6B6A" stroke-width="1.5"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg></div>`

    return `<div class="conv-card${id===cur?' selected':''}" onclick="selectConv('${id}')" data-type="${c.channel}" id="card-${id}"><div class="row">${avHtml}<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;justify-content:space-between;gap:4px"><span class="card-name">${c.name}</span><div style="display:flex;align-items:center;gap:6px"><span class="chip ${c.chipClass}">${c.chipLabel}</span><span class="card-time">${c.time}</span></div></div><div class="card-meta">${c.meta}</div><div class="card-preview">${c.hasUnread?'<span class="unread-dot"></span> ':''}${c.preview}</div><span class="label-chip ${c.labelClass}">${c.labelText}</span></div></div></div>`;

function av(c,sz){const s=sz||44,fs=s<40?'11px':'13px';return c.avatar?`<div class="bubble-avatar" style="width:${s}px;height:${s}px;background:${c.avatarBg};font-size:${fs}"><img src="${c.avatar}" onerror="this.style.display='none';this.parentElement.textContent='${c.initials}'" alt=""></div>`:`<div class="bubble-avatar" style="width:${s}px;height:${s}px;background:${c.avatarBg};font-size:${fs}">${c.initials||''}</div>`;}

// === HEADER ===
function renderHeader(c){
  const h=document.getElementById('col2-header');
  const backBtn=`<button class="back-btn" onclick="goBack()">${I.back}</button>`;
  const ctxBtn=`<button class="ctx-toggle" onclick="openDrawer()" title="Context panel">${I.info}</button>`;
  const overflowBtn=`<button class="overflow-menu" title="More options">⋯</button>`;

  if(c.channel==='post'){
    h.innerHTML=`<div class="header-top">${backBtn}<div style="flex:1;min-width:0"><div class="post-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.postTitle}</div><div class="post-author">Posted by ${c.postAuthor} · ${c.postDate}</div><div class="post-audience" style="margin-top:6px">${c.postAudience}</div></div><div class="header-right"><button class="btn-secondary">Edit Post</button><button class="btn-secondary" style="color:var(--status-open);border-color:#FECACA">Delete</button>${overflowBtn}${ctxBtn}</div></div>`;return;
  }

    h.innerHTML=`<div class="header-top">${backBtn}<div style="width:40px;height:40px;border-radius:50%;background:var(--surface-warm);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#5A6B6A" stroke-width="1.5"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg></div><div style="flex:1;min-width:0"><div class="header-name">System Alert</div><div class="header-sub">${c.property}</div></div><div class="header-right">${ctxBtn}</div></div>`;return;
  }
  const online=c.channel==='chat'?(c.online?'<span class="header-online">● Active now</span><span style="color:var(--border)">·</span>':`<span class="header-offline">● ${c.onlineText}</span><span style="color:var(--border)">·</span>`):'';
  const od=c.channel==='chat'&&c.online?'<div class="online-dot"></div>':'';
  const cc=c.channel==='chat'?'chip-chat':c.channel==='email'?'chip-email':'chip-sms';
  let meta='';
  if(c.channel==='email') meta=`<div class="email-meta-row"><div class="email-subject">${c.email.subject}</div><div class="email-fromto"><span>${c.email.from}</span><span style="color:var(--border)">→</span><span>${c.email.to}</span>${c.email.encrypted?'<span class="encrypted-badge">Encrypted</span>':''}</div></div>`;
  if(c.channel==='sms') meta=`<div style="margin-top:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap"><span class="sms-phone">${c.phone}</span>${c.smsOptIn?`<span class="sms-optin"><svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg> SMS Opted In</span>`:''}</div>`;
  h.innerHTML=`<div class="header-top">${backBtn}<div style="position:relative;flex-shrink:0">${av(c,isMobile()?36:44)}${od}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="header-name">${c.name}</span><span class="header-status">${c.status}</span><span class="chip ${cc}">${c.channel.toUpperCase()}</span></div><div class="header-sub">${online}<span style="overflow:hidden;text-overflow:ellipsis">${c.property}</span></div></div><div class="header-right"><button class="btn-secondary">View Lease</button><button class="btn-primary">View Profile</button>${overflowBtn}${ctxBtn}</div></div>${meta}`;
}

function renderPost(el){readListOpen=false;el.innerHTML=`<div class="post-content-card"><div class="post-body"><p><strong>Elevator Maintenance Notice</strong></p><p>Please be advised that the building elevator will undergo scheduled maintenance on <strong>October 28th from 8:00 AM to 12:00 PM</strong>.</p><p>Residents on floors 3+ are encouraged to plan accordingly. The stairwell will remain accessible. If you have mobility concerns, please contact management.</p><p>— Skyline Lofts Property Management</p></div></div><div class="read-receipt-section"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap"><div><div class="read-receipt-text">Read by 18 of 24 tenants</div><div class="read-receipt-sub">75% read rate</div></div><button class="remind-all-btn" onclick="alert('Reminders sent')">Remind All Unread</button></div><div class="progress-bar"><div class="progress-fill" style="width:75%"></div></div><div class="delivery-breakdown"><span>📱 15 in-app</span><span>✉️ 6 email</span><span>💬 3 SMS</span></div><button class="toggle-list-btn" onclick="toggleReadList()">Show tenant list ↓</button><div id="read-list" style="display:none" class="tenant-read-list">${genReadList()}</div></div>`;}

function renderSystem(el){el.innerHTML=`<div class="date-divider"><span>OCT 24</span></div><div style="max-width:480px;margin:0 auto"><div style="background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border-light);padding:28px;text-align:center;box-shadow:var(--shadow-sm)"><div style="width:48px;height:48px;background:var(--surface);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#5A6B6A" stroke-width="1.5"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg></div><div style="font-family:'Source Serif 4',Georgia,serif;font-size:15px;font-weight:600;color:var(--ink);margin-bottom:6px">Portfolio-wide System Alert</div><div style="font-size:14px;color:var(--ink-secondary);line-height:1.65">Scheduled maintenance for elevator inspection: October 28th, 8:00 AM – 12:00 PM.</div><div style="margin-top:14px;font-size:12px;color:var(--ink-tertiary)">Oct 24 · 10:00 AM · Auto-generated</div></div></div>`;}

// === COMPOSE ===
function renderCompose(c){const el=document.getElementById('col2-compose');if(c.channel==='system'){el.innerHTML='<div class="compose-disabled-msg">System notification — no reply needed.</div>';return;}if(c.channel==='post'){el.innerHTML='<div class="compose-disabled-msg">Posts are broadcast only.</div>';return;}if(c.channel==='email'&&!emailReplyOpen){el.innerHTML='';return;}const ai=c.aiDraft?mkAI(c):'';let fields='',tb='',ph='',sl='',cl='',cc='';if(c.channel==='email'){fields=`<div class="compose-email-fields"><div class="compose-field"><label>To:</label><span>${c.email.from}</span></div><div class="compose-field"><label>Subject:</label><input type="text" value="${c.email.subject}"></div></div>`;tb=mkTB(['bold','italic','divider','attach','image','emoji']);ph='Write your reply...';sl='Send Email';cl=`<span class="compose-channel-lock">${I.lock} Via Email</span>`;}else if(c.channel==='sms'){tb=mkTB(['image']);ph=`SMS to ${c.name.split(' ')[0]}...`;sl='Send SMS';cl=`<span class="compose-channel-lock">${I.lock} Via SMS</span>`;cc='<span class="char-counter ok" id="sms-counter">0 / 160 · 1 seg</span>';}else{tb=mkTB(['bold','italic','divider','attach','image','emoji']);ph=`Message ${c.name.split(' ')[0]}...`;sl='Send';cl=`<span class="compose-channel-lock">${I.lock} Via Chat</span>`;}el.innerHTML=`${ai}<div class="compose-box">${fields}<div class="compose-toolbar">${tb}</div><textarea class="compose-textarea" rows="2" placeholder="${ph}" id="compose-input" ${c.channel==='sms'?'oninput="updateSMS()"':''}></textarea><div class="compose-footer">${cl}<span class="compose-hint" style="margin-left:auto">⌘+Enter</span>${cc?'<span style="margin-left:8px">'+cc+'</span>':''}<button class="send-btn">${sl} ${I.send}</button></div></div>`;}
function mkTB(items){const m={bold:`<button>${I.bold}</button>`,italic:`<button>${I.italic}</button>`,attach:`<button>${I.attach}</button>`,image:`<button>${I.image}</button>`,emoji:`<button>${I.emoji}</button>`,divider:'<div class="divider"></div>'};return items.map(i=>m[i]||'').join('');}
function mkAI(c){return `<div class="ai-block" id="ai-block"><div class="ai-label">${I.star} ${c.channel==='post'?'AI SUGGESTED DRAFT':'AI SUGGESTED REPLY'}</div><div class="ai-draft">"${c.aiDraft}"</div><div class="ai-actions"><button class="ai-use-btn" onclick="useSuggestion()">Use Suggestion</button><button class="ai-dismiss-btn" onclick="dismissAI()">Dismiss</button></div></div>`;}

// === COL 3 ===
function renderCol3(c){const el=document.getElementById('col3-inner');if(c.channel==='post'){el.innerHTML=`<div class="section-label">Audience Overview</div><div class="context-card"><div style="font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px">24 tenants · Skyline Lofts</div><div style="font-size:12px;color:var(--ink-secondary)">All units included</div></div><div class="section-label">Delivery Stats</div><div class="context-card"><div class="delivery-stat-row"><div class="delivery-stat-dot" style="background:var(--primary)"></div><span><strong>24</strong> in-app</span></div><div class="delivery-stat-row"><div class="delivery-stat-dot" style="background:var(--chip-email)"></div><span><strong>18</strong> email · <span style="color:var(--status-open)">2 bounced</span></span></div><div class="delivery-stat-row"><div class="delivery-stat-dot" style="background:var(--chip-sms)"></div><span><strong>6</strong> SMS · <span style="color:var(--status-open)">1 failed</span></span></div></div><div class="section-label">Read Rate</div><div class="context-card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><span style="font-family:'Source Serif 4',Georgia,serif;font-size:22px;font-weight:600;color:var(--primary)">75%</span><span style="font-size:12px;color:#34C759;font-weight:600">↑ from 68%</span></div><div class="progress-bar"><div class="progress-fill" style="width:75%"></div></div><div style="font-size:12px;color:var(--ink-tertiary);margin-top:6px">18 of 24 tenants</div></div><div class="section-label">Recent Posts</div><div class="context-card" style="padding:14px 18px"><div class="recent-post-row"><div class="recent-post-title">Elevator Maintenance — Oct 28th</div><div class="recent-post-meta">Oct 15 · 75% read</div></div><div class="recent-post-row"><div class="recent-post-title">Holiday Parking Policy</div><div class="recent-post-meta">Oct 1 · 68% read</div></div><div class="recent-post-row"><div class="recent-post-title">Fire Safety Inspection</div><div class="recent-post-meta">Sep 20 · 82% read</div></div></div>`;return;}
if(c.channel==='system'){el.innerHTML='<div style="text-align:center;color:var(--ink-tertiary);padding:40px 0;font-size:13px">No tenant context for system alerts.</div>';return;}
const p=c.prop;el.innerHTML=`<div class="section-label">Property Context</div><div class="context-card"><div style="display:flex;align-items:center;gap:11px;margin-bottom:16px"><div style="width:38px;height:38px;background:var(--primary-bg);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center">${I.home}</div><div><div style="font-family:'Source Serif 4',Georgia,serif;font-size:14px;font-weight:600;color:var(--ink)">${p.name}</div><div style="font-size:12px;color:var(--ink-secondary)">${p.unit}</div></div></div><div style="display:flex;flex-direction:column;gap:6px"><div class="context-row"><div class="context-row-icon">${I.calendar}</div><div><div class="context-row-label">Lease Ends</div><div class="context-row-value">${p.leaseEnd} <span style="color:var(--ink-tertiary)">(${p.leaseLeft})</span></div></div></div><div class="context-row"><div class="context-row-icon">${I.dollar}</div><div><div class="context-row-label">Monthly Rent</div><div style="display:flex;align-items:center;gap:6px"><span class="context-row-value lg">${p.rent}</span><span style="font-size:12px;font-weight:600;color:${p.rentColor}">· ${p.rentStatus}</span></div></div></div><div class="context-row"><div class="context-row-icon">${I.lockSmall}</div><div><div class="context-row-label">Security Deposit</div><div class="context-row-value">${p.deposit}</div></div></div></div><div class="stat-grid"><div class="stat-cell"><div class="val">2 Open</div><div class="lbl">Service Requests</div></div><div class="stat-cell"><div class="val" style="color:var(--primary)">0 Days</div><div class="lbl">Delinquency</div></div></div><div class="insurance-row">${I.shield}<span class="insurance-badge">Insurance Verified</span><span style="font-size:12px;color:var(--ink-secondary);margin-left:auto">🐕 1 Pet</span></div></div><div class="section-label">Sentiment</div><div class="context-card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;font-weight:600;color:var(--ink)">Sentiment Score</span><span style="font-family:'Source Serif 4',Georgia,serif;font-size:14px;font-weight:600;color:var(--primary)">92%</span></div><div class="sentiment-bar"><div class="sentiment-fill" style="width:92%"></div></div><div style="font-size:11px;color:var(--ink-tertiary);margin-top:5px">Highly satisfied · last 3 interactions</div></div><div class="section-label">Recent Activity</div><div class="context-card"><div class="activity-row"><div style="display:flex;align-items:center;gap:8px">${I.wrench}<span style="font-size:12px;color:var(--ink-secondary)">Kitchen Leak</span></div><span class="status-chip status-open">Open</span></div><div class="activity-row"><div style="display:flex;align-items:center;gap:8px">${I.bulb}<span style="font-size:12px;color:var(--ink-secondary)">AC Filter Check</span></div><span class="status-chip status-pending">Pending</span></div><div class="activity-row"><div style="display:flex;align-items:center;gap:8px">${I.doc}<span style="font-size:12px;color:var(--ink-secondary)">Lease Extension</span></div><span class="status-chip status-closed">Closed</span></div></div><div class="section-label">Recent Documents</div><div class="context-card"><div class="doc-row">${I.file}<span style="font-size:12px;color:var(--ink-secondary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Lease_Renewal_2024.pdf</span><span style="color:var(--ink-tertiary);cursor:pointer">${I.download}</span></div><div class="doc-row">${I.imgfile}<span style="font-size:12px;color:var(--ink-secondary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Move_In_Inspection.jpg</span><span style="color:var(--ink-tertiary);cursor:pointer">${I.download}</span></div></div>`;}

// === INTERACTIONS ===
function selectConv(id){
  cur=id; emailReplyOpen=false;
  document.querySelectorAll('.conv-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('card-'+id)?.classList.add('selected');
  const c=convs[id];
  renderHeader(c); renderBody(c); renderCompose(c); renderCol3(c);
  if(isMobile()) document.getElementById('hub').classList.add('show-conv');
}
function goBack(){document.getElementById('hub').classList.remove('show-conv');}
function setFilter(type,el){document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.querySelectorAll('.conv-card').forEach(card=>{card.style.display=type==='all'?'':card.getAttribute('data-type')===type?'':'none';});}
function toggleEm(id){const b=document.getElementById(id+'-b'),ch=document.getElementById(id+'-ch');if(b.style.display==='none'){b.style.display='';ch.classList.add('open');}else{b.style.display='none';ch.classList.remove('open');}}
function toggleReadList(){readListOpen=!readListOpen;const l=document.getElementById('read-list');l.style.display=readListOpen?'':'none';l.previousElementSibling.textContent=readListOpen?'Hide tenant list ↑':'Show tenant list ↓';}
function openEmailReply(){emailReplyOpen=true;renderCompose(convs[cur]);document.getElementById('compose-input')?.focus();}
function dismissAI(){const b=document.getElementById('ai-block');if(b)b.style.display='none';}
function useSuggestion(){const c=convs[cur],inp=document.getElementById('compose-input');if(c.aiDraft&&inp){inp.value=c.aiDraft;inp.focus();if(c.channel==='sms')updateSMS();}dismissAI();}
function updateSMS(){const inp=document.getElementById('compose-input'),ctr=document.getElementById('sms-counter');if(!inp||!ctr)return;const txt=inp.value,uni=/[^\x00-\x7F]/.test(txt),lim=uni?70:160,len=txt.length,seg=Math.max(1,Math.ceil(len/lim));ctr.textContent=`${len} / ${lim} · ${seg} seg${seg>1?'s':''}`;ctr.className='char-counter '+(len<=(uni?60:140)?'ok':len<=lim?'warn':'over');}
function openDrawer(){drawerOpen=true;document.getElementById('col3').classList.add('open');document.getElementById('col3-backdrop').classList.add('visible');document.getElementById('drawer-close').style.display='';}
function closeDrawer(){drawerOpen=false;document.getElementById('col3').classList.remove('open');document.getElementById('col3-backdrop').classList.remove('visible');document.getElementById('drawer-close').style.display='none';}

function handleResize(){
  const w=window.innerWidth;
  const dc=document.getElementById('drawer-close');
  if(w>=1280){document.getElementById('col3').classList.remove('open');document.getElementById('col3-backdrop').classList.remove('visible');dc.style.display='none';drawerOpen=false;}
  if(w>=768)document.getElementById('hub').classList.remove('show-conv');
}
window.addEventListener('resize',handleResize);
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&drawerOpen)closeDrawer();});

// INIT
buildCards();
selectConv('sarah');
if(!isMobile()) document.getElementById('hub').classList.remove('show-conv');
</script>
</body>
</html>
