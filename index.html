  document.getElementById('smsConvoProfileContent').innerHTML = renderTenantDetails(tenantId, { layout: 'wide' });
}

function renderEmailDetailPanel(body) {
  const threadId = state.emailSelectedThread;
  if (!threadId) { body.innerHTML = ''; return; }
  const thread = emailThreadById(threadId);
  if (!thread) { body.innerHTML = ''; return; }

  const participants = thread.participants.filter(p => p.email !== 'landlord@innago.com');
  if (participants.length === 0) { body.innerHTML = '<div style="padding:10px;font-size:12px;color:var(--hub-text-tertiary)">No other participants</div>'; return; }

  // Determine most recent replier for auto-expand (only once per thread)
  const lastMsg = thread.messages[thread.messages.length - 1];
  const lastSenderEmail = lastMsg.fromEmail;
  if (!state._emailPanelAutoExpandDone) {
    state._emailPanelAutoExpandDone = true;
    // Auto-expand most recent replier
    const recentP = participants.find(p => p.email === lastSenderEmail);
    if (recentP && recentP.tenantId) state.emailPanelExpanded.add(recentP.tenantId);
    // If single tenant, auto-expand
    const tenantParticipants = participants.filter(p => p.tenantId);
    if (tenantParticipants.length === 1) state.emailPanelExpanded.add(tenantParticipants[0].tenantId);
  }

  const colors = ['#1E3A8A','#7C3AED','#B45309','#059669','#DB2777','#6D28D9','#DC2626'];
  const chevSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><polyline points="6 9 12 15 18 9" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  let html = '';

  for (const p of participants) {
    if (p.isExternal) {
      // External: just email + badge, no expand
      const initial = p.name.charAt(0).toUpperCase();
      html += `<div class="dp-ext-line">
        <div class="dp-acc-avatar ext">${initial}</div>
        <div class="dp-ext-info"><div class="dp-ext-email">${escapeHtml(p.email)}</div><span class="dp-acc-badge">External</span></div>
      </div>`;
    } else if (p.tenantId) {
      // Tenant: accordion card
      const t = tenantById(p.tenantId);
      if (!t) continue;
      const key = p.tenantId;
      const isOpen = state.emailPanelExpanded.has(key);
      const bg = colors[t.name.length % colors.length];
      html += `<div class="dp-participant">
        <div class="dp-acc-head" onclick="toggleEmailPanelAccordion('${key}')">
          <div class="dp-acc-avatar" style="background:${bg}">${t.initials}</div>
          <div style="flex:1;min-width:0"><div class="dp-acc-name">${escapeHtml(t.name)}</div><div class="dp-acc-sub">${escapeHtml(t.property)} · ${escapeHtml(t.unit)}</div></div>
          <svg class="dp-acc-chev ${isOpen ? 'open' : ''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><polyline points="6 9 12 15 18 9" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>`;
      if (isOpen) {
        html += `<div class="dp-acc-body">${renderTenantDetails(p.tenantId)}</div>`;
      }
      html += `</div>`;
    }
  }
  body.innerHTML = html;
}

function toggleEmailPanelAccordion(key) {
  if (state.emailPanelExpanded.has(key)) state.emailPanelExpanded.delete(key);
  else state.emailPanelExpanded.add(key);
  renderDetailPanel();
}

/* ============================================================

/* v5.35 — Resizers for chat and SMS lists */
function initChatListResizer() {
  const resizer = document.getElementById('chatListResizer');
  if (!resizer || resizer._bound) return;
  resizer._bound = true;
  const shell = document.getElementById('shell');
  const MIN_W = 240, MAX_W = 520;
  resizer.addEventListener('mousedown', (e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startW = state.listWidths.chat;
    resizer.classList.add('dragging');
    const move = (ev) => {
      const newW = Math.min(MAX_W, Math.max(MIN_W, startW + (ev.clientX - startX)));
      state.listWidths.chat = newW;
      shell.style.setProperty('--chat-list-w', newW + 'px');
    };
    const up = () => {
      resizer.classList.remove('dragging');
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}

function initSMSListResizer() {
  const resizer = document.getElementById('smsListResizer');
  if (!resizer || resizer._bound) return;
  resizer._bound = true;
  const shell = document.getElementById('shell');
  const MIN_W = 240, MAX_W = 520;
  resizer.addEventListener('mousedown', (e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startW = state.listWidths.sms;
    resizer.classList.add('dragging');
    const move = (ev) => {
      const newW = Math.min(MAX_W, Math.max(MIN_W, startW + (ev.clientX - startX)));
      state.listWidths.sms = newW;
      shell.style.setProperty('--sms-list-w', newW + 'px');
    };
    const up = () => {
      resizer.classList.remove('dragging');
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}
