function renderGroupMsg(m) {
  if (m.who === 'out') {
    // v5.31 — group outbound status capped at 'delivered'.
    // 'read' is intentionally not supported for groups (see header rationale).
    // Defensive cap: any stale 'read' gets coerced to 'delivered'.
    let status = m.deliveryStatus || 'delivered';
    if (status === 'read') status = 'delivered';
    const statusHtml = renderMsgStatus(status, 'chat');
    const failClass = status === 'failed' ? 'sms-failed' : '';
    let retryHtml = '';
    if (status === 'failed') {
      retryHtml = `
        <a class="chat-retry-link" onclick="retryGroupChatMessage('${escapeAttr(m._groupId || '')}', ${m._msgIdx || 0})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="10" height="10"><polyline points="1 4 1 10 7 10" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Retry
        </a>
      `;
    }
    return `
      <div class="msg out ${failClass}">
        <div>${escapeHtml(m.text).replace(/\n/g, '<br>')}</div>
        <span class="time">${escapeHtml(m.time)} ago${statusHtml}${retryHtml}</span>
      </div>
    `;
  }
  // Inbound — unchanged
  const [type, id] = m.who.split(':');
  const obj = type === 'tenant' ? tenantById(id) : staffById(id);
  const senderLabel = obj ? `${obj.name}${type === 'staff' ? ` · ${obj.role}` : ''}` : 'Unknown';
  return `
    <div class="msg in from-group">
      <div class="msg-sender">${escapeHtml(senderLabel)}</div>
      <div>${escapeHtml(m.text).replace(/\n/g, '<br>')}</div>
      <span class="time">${escapeHtml(m.time)} ago</span>
    </div>
  `;
}

/* v5.30 — retry a failed group message (mirrors retryChatMessage for 1:1) */
function retryGroupChatMessage(groupId, msgIdx) {
  if (!groupId || !GROUP_MESSAGES[groupId]) return;
  const msg = GROUP_MESSAGES[groupId][msgIdx];
  if (!msg || msg.who !== 'out') return;
  msg.deliveryStatus = 'sending';
  renderConversation();
  setTimeout(() => { msg.deliveryStatus = 'sent'; renderConversation(); }, 300);
  setTimeout(() => { msg.deliveryStatus = 'delivered'; renderConversation(); }, 1100);
}

function onChatComposerInput() {
  const ta = document.getElementById('chatComposer');
  const send = document.getElementById('chatSendBtn');
  if (!ta || !send) return;
  send.disabled = ta.value.trim().length === 0;
  // Auto-grow
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
}

function onChatComposerKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChatMessage();
  }
}

function sendChatMessage() {
  const ta = document.getElementById('chatComposer');
  const text = (ta?.value || '').trim();
  if (!text) return;

  // Group send
  if (state.chatSelectedGroup) {
    const g = groupById(state.chatSelectedGroup);
    if (!g) return;
    if (!GROUP_MESSAGES[g.id]) GROUP_MESSAGES[g.id] = [];
    // v5.30 — group outbound starts at 'sending', progresses like 1:1
    const newMsg = { who: 'out', time: 'now', text, deliveryStatus: 'sending' };
    GROUP_MESSAGES[g.id].push(newMsg);
    g.lastPreview = `You: ${text.length > 60 ? text.slice(0, 60) + '…' : text}`;
    g.lastTime = 'now';
    g.sortKey = 0;
    g.unread = false;
    g.needsAction = false;
    ta.value = '';
    renderConversation();
    renderChatList();
    // Progression: sending → sent (300ms) → delivered (1.1s, "to all members")
    setTimeout(() => {
      newMsg.deliveryStatus = 'sent';
      if (state.chatSelectedGroup === g.id) renderConversation();
    }, 300);
    setTimeout(() => {
      newMsg.deliveryStatus = 'delivered';
      if (state.chatSelectedGroup === g.id) renderConversation();
    }, 1100);
    return;
  }

  // 1:1 tenant send
  const tenantId = state.chatSelectedTenant;
  if (!tenantId) return;
  if (!MESSAGES[tenantId]) MESSAGES[tenantId] = [];
  // v5.28 — outbound chat starts at 'sending', progresses via CometChat receipts
  const newMsg = { who: 'out', time: 'now', text, deliveryStatus: 'sending' };
  MESSAGES[tenantId].push(newMsg);
  ROWS.filter(r => r.channel === 'chat' && r.tenantId === tenantId).forEach(r => {
    r.replied = true;
    r.unread = false;
  });
  ta.value = '';
  updateBadge();
  renderConversation();
  renderChatList();

  // Simulated progression: sending → sent (300ms) → delivered (1100ms)
  // 'read' is not auto-simulated (would require faking tenant presence).
  setTimeout(() => {
    newMsg.deliveryStatus = 'sent';
    if (state.chatSelectedTenant === tenantId) renderConversation();
  }, 300);
  setTimeout(() => {
    newMsg.deliveryStatus = 'delivered';
    if (state.chatSelectedTenant === tenantId) renderConversation();
  }, 1100);
}

function composerStub(kind) {
  alert(`${kind.toUpperCase()} picker — stub.\n\nIn prod: opens the ${kind} picker UI.`);
}

function useAISuggestionInChat(rowId) {
  const suggestion = AI_SUGGESTIONS[rowId] || '';

function toggleSelectionForCard(kind, id) {
  // Enter selection mode if not already
  if (!state.selecting) {
    state.selecting = true;
  }
  const set = kind === 'tenant' ? state.selectedTenants : state.selectedGroups;
  if (set.has(id)) set.delete(id);
  else set.add(id);
  // Exit selection if nothing selected
  if (state.selectedTenants.size + state.selectedGroups.size === 0) {
    exitSelection();
    return;
  }
  renderChatList();
}

function exitSelection() {
  state.selecting = false;
  state.selectedTenants.clear();
  state.selectedGroups.clear();
  renderChatList();
}

function selectAllChats() {
  const items = getAllChatListItems();
  // Apply current search/filter so "Select all" respects the visible list
  const q = (state.chatSearch || '').trim().toLowerCase();
  const f = state.chatFilters;
  const visible = items.filter(it => {
    if (q) {
      const hay = it.kind === 'tenant'
        ? [it._data.tenant?.name, it._data.tenant?.property, it._data.tenant?.unit, it._data.mostRecent.preview].filter(Boolean).join(' ').toLowerCase()
        : [it._data.name, it._data.lastPreview].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (f.properties.size > 0) {
      if (it.kind === 'tenant') return f.properties.has(it._data.tenant?.property);
      return it._data.members.some(m => { const o = memberById(m); return o && f.properties.has(o.property); });
    }
    if (f.statuses.has('unread') && !it.unreadCount && !it.unread) return false;
    return true;
  });
  state.selectedTenants.clear();
  state.selectedGroups.clear();
  visible.forEach(it => {
    if (it.kind === 'tenant') state.selectedTenants.add(it.tenantId);
    else state.selectedGroups.add(it.id);
  });
  if (!state.selecting) state.selecting = true;
  renderChatList();
}

function updateSelectionBarUI() {
  const count = state.selectedTenants.size + state.selectedGroups.size;
  const countEl = document.getElementById('selCount');
  if (countEl) countEl.textContent = count;

  // Determine pin / archive labels based on selection state
  const allItems = getAllChatListItems();
  const sel = allItems.filter(it => (it.kind === 'tenant' && state.selectedTenants.has(it.id)) || (it.kind === 'group' && state.selectedGroups.has(it.id)));
  const allPinned = sel.length > 0 && sel.every(it => it.pinned);
  const pinLbl = document.getElementById('selPinLbl');
  if (pinLbl) pinLbl.textContent = allPinned ? 'Unpin' : 'Pin';

  const archiveLbl = document.getElementById('selArchiveLbl');
  if (archiveLbl) archiveLbl.textContent = 'Archive';

  // Disable bulk buttons if nothing selected
  ['selArchiveBtn', 'selPinBtn', 'selReadBtn'].forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.disabled = count === 0;
  });
}

function bulkArchive() {
  let count = 0;
  state.selectedTenants.forEach(tenantId => {
    ROWS.filter(r => r.channel === 'chat' && r.tenantId === tenantId).forEach(r => { r.archived = true; });
    count++;
    if (state.chatSelectedTenant === tenantId) {
      state.chatSelectedTenant = null;
    }
  });
  state.selectedGroups.forEach(groupId => {
    const g = groupById(groupId);
    if (g) { g.archived = true; count++; }
    if (state.chatSelectedGroup === groupId) state.chatSelectedGroup = null;
  });
  exitSelection();
  updateBadge();
  renderConversation();
  showToast(`${count} chat${count !== 1 ? 's' : ''} archived`, 'ok');
}

function bulkPin() {
  // Determine action: if all selected are pinned, unpin; else pin all
  const allItems = getAllChatListItems();
  const sel = allItems.filter(it => (it.kind === 'tenant' && state.selectedTenants.has(it.id)) || (it.kind === 'group' && state.selectedGroups.has(it.id)));
  const allPinned = sel.length > 0 && sel.every(it => it.pinned);
  if (allPinned) {
    sel.forEach(it => state.pinnedChats.delete(it.id));
    showToast(`${sel.length} chat${sel.length !== 1 ? 's' : ''} unpinned`, 'ok');
  } else {
    // Try to pin; respect cap
    const toPin = sel.filter(it => !it.pinned);
    const room = PIN_CAP - state.pinnedChats.size;
    if (toPin.length > room) {
      showToast(`Pin limit (${PIN_CAP}) reached. Pinning first ${room} of ${toPin.length}.`, 'warn');
      toPin.slice(0, room).forEach(it => state.pinnedChats.add(it.id));
    } else {
      toPin.forEach(it => state.pinnedChats.add(it.id));
      showToast(`${toPin.length} chat${toPin.length !== 1 ? 's' : ''} pinned`, 'ok');
    }
  }
  exitSelection();
}

function bulkMarkRead() {
  let count = 0;
  state.selectedTenants.forEach(tenantId => {
    ROWS.filter(r => r.channel === 'chat' && r.tenantId === tenantId && r.unread).forEach(r => { r.unread = false; count++; });
  });
  state.selectedGroups.forEach(groupId => {
    const g = groupById(groupId);
    if (g && g.unread) { g.unread = false; count++; }
  });
  exitSelection();
  updateBadge();
  showToast(`Marked ${count} as read`, 'ok');
}

// Single-card archive (from card hover button)
function archiveChatTenant(tenantId) {
  const archivedRows = ROWS.filter(r => r.channel === 'chat' && r.tenantId === tenantId);
  archivedRows.forEach(r => { r.archived = true; });
  const wasPinned = state.pinnedChats.has(tenantId);
  if (state.chatSelectedTenant === tenantId) state.chatSelectedTenant = null;
  state.pinnedChats.delete(tenantId);
  updateBadge();
  renderChatList();
  renderConversation();
  showToast('Chat archived', 'ok', {
    undoFn: () => {
      archivedRows.forEach(r => { r.archived = false; });
      if (wasPinned) state.pinnedChats.add(tenantId);
      updateBadge();
      renderChatList();
      renderConversation();
    }
  });
}

function archiveChatGroup(groupId) {
  const g = groupById(groupId);
  if (g) g.archived = true;
  const wasPinned = state.pinnedChats.has(groupId);
  if (state.chatSelectedGroup === groupId) state.chatSelectedGroup = null;
  state.pinnedChats.delete(groupId);
  renderChatList();
  renderConversation();
  showToast('Group archived', 'ok', {
    undoFn: () => {
      if (g) g.archived = false;
      if (wasPinned) state.pinnedChats.add(groupId);
      renderChatList();
      renderConversation();
    }
  });
}

function togglePinGroup(groupId) {
  if (state.pinnedChats.has(groupId)) {
    state.pinnedChats.delete(groupId);
  } else {
    if (state.pinnedChats.size >= PIN_CAP) {
      showToast(`Pin limit reached (${PIN_CAP})`, 'warn');
      return;
    }
    state.pinnedChats.add(groupId);
  }
  renderChatList();
}

function renderNewChatPickerList() {
  const body = document.getElementById('clpChatBody');
  if (!body) return;
  const q = (state.chatPickerSearch || '').trim().toLowerCase();
  const propFilter = state.chatPickerPropFilter || '';

  // Tenants with at least one visible (active/upcoming) lease
  let tenants = TENANTS.filter(t => visibleLeases(t).length > 0);

  // Apply property filter — match against ANY of the tenant's visible leases
  if (propFilter) {
    tenants = tenants.filter(t => visibleLeases(t).some(l => l.property === propFilter));
  }
  // Apply search
  if (q) {
    tenants = tenants.filter(t => {
      const hay = [t.name, ...visibleLeases(t).map(l => `${l.property} ${l.unit}`)].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }

  if (tenants.length === 0) {
    const msg = q
      ? `No tenants match "${escapeHtml(q)}"${propFilter ? ` in ${escapeHtml(propFilter)}` : ''}`
      : (propFilter ? `No tenants in ${escapeHtml(propFilter)}` : 'No tenants available');
    body.innerHTML = `<div class="clp-empty">${msg}</div>`;
    return;
  }

  // Existing chats — show "EXISTING" tag
  const existingChatTenantIds = new Set(
    ROWS.filter(r => r.channel === 'chat' && !r.archived).map(r => r.tenantId)
  );

  // Sort by name (A–Z) since flat list — no property grouping
  tenants.sort((a, b) => a.name.localeCompare(b.name));

  // Flat list — no property headers
  body.innerHTML = `<div class="clp-prop-group">` + tenants.map(t => {
    const existing = existingChatTenantIds.has(t.id);
    const leases = visibleLeases(t);
    const sub = `${tenantProperty(t)} · ${tenantUnit(t)}${leases.length > 1 ? ` · +${leases.length - 1} more` : ''}`;
    return `
      <div class="clp-row" onclick="pickNewChatTenant('${t.id}')">
        <div class="avatar ${t.avatarCls}">${t.initials}</div>
        <div class="clp-row-info">
          <div class="clp-row-name">${escapeHtml(t.name)}</div>
          <div class="clp-row-sub">${escapeHtml(sub)}</div>
        </div>
        ${existing ? '<span class="clp-existing-tag">Existing</span>' : ''}
      </div>
    `;
  }).join('') + `</div>`;
}

function pickNewChatTenant(tenantId) {
  // If a chat row already exists for this tenant, just open it
  const existing = ROWS.find(r => r.channel === 'chat' && r.tenantId === tenantId && !r.archived);
  if (!existing) {
    // Create a stub chat row so the conversation pane has something to show
    const t = tenantById(tenantId);
    if (!t) return;
    const newRow = {
      id: 'r-chat-' + Date.now(),
      tenantId,
      channel: 'chat',
      sortKey: 0,
      time: 'now',
      preview: '(No messages yet)',
      subject: null,
      category: 'general',
      unread: false,
      needsAction: false,
      archived: false,
      direction: 'in',
    };
    ROWS.unshift(newRow);
    if (!MESSAGES[tenantId]) MESSAGES[tenantId] = [];
  }
  closeChatListPicker();
  selectChat(tenantId);
}

function confirmCloseGroupPicker() {
  const c = state.groupComposer;
  const hasName = (document.getElementById('gcName')?.value || '').trim().length > 0;
  const hasMembers = c?.selected?.size > 0;
  if (hasName || hasMembers) {
    if (!confirm('Discard this group? Your selections will be lost.')) return;
  }
  state.groupComposer.open = false;
  closeChatListPicker();
}

function switchGroupTab(tab) {
  state.groupComposer.tab = tab;
  // v5.18: Picker uses .clp-tab; legacy modal used .gc-tab — handle both
  document.querySelectorAll('.gc-tab, .clp-tab').forEach(t => t.classList.toggle('on', t.dataset.tab === tab));
  renderGroupPickerList();
}

function renderGroupPickerList() {
  const c = state.groupComposer;
  const list = document.getElementById('gcList');
  if (!list) return;
  c.search = document.getElementById('gcSearch')?.value || '';
  c.propFilter = document.getElementById('gcPropFilter')?.value || '';
  const q = c.search.trim().toLowerCase();
  const isAddMode = c.mode === 'add';
  const targetGroup = isAddMode ? groupById(c.targetGroupId) : null;
  const existingCount = isAddMode ? (targetGroup?.members.length || 0) : 0;
  const remaining = GROUP_CAP - existingCount;

  let pool;
  if (c.tab === 'tenants') {
    pool = TENANTS.map(t => ({ key: 'tenant:' + t.id, obj: t, sub: `${t.property} · ${t.unit}` }));
  } else {
    pool = STAFF.map(s => ({ key: 'staff:' + s.id, obj: s, sub: `${s.role}${s.property ? ' · ' + s.property : ''}` }));
  }
  if (c.propFilter) {
    pool = pool.filter(p => p.obj.property === c.propFilter);
  }
  if (q) {
    pool = pool.filter(p => (p.obj.name + ' ' + p.sub).toLowerCase().includes(q));
  }

  // Update tab counters (selection count per tab)
  const tenantSelCount = [...c.selected].filter(k => k.startsWith('tenant:')).length;
  const staffSelCount  = [...c.selected].filter(k => k.startsWith('staff:')).length;
  const tBadge = document.getElementById('gcTenantBadge');
  const sBadge = document.getElementById('gcStaffBadge');
  if (tBadge) tBadge.textContent = tenantSelCount;
  if (sBadge) sBadge.textContent = staffSelCount;

  // Counter — different copy for add mode
  const total = c.selected.size;
  const counter = document.getElementById('gcCounter');
  if (counter) {
    if (isAddMode) {
      counter.textContent = `${total} selected to add · ${existingCount + total} of ${GROUP_CAP} after add`;
      counter.classList.toggle('cap', existingCount + total >= GROUP_CAP);
    } else {
      counter.textContent = `${total} / ${GROUP_CAP} selected`;
      counter.classList.toggle('full', total >= GROUP_CAP);
    }
  }

  if (pool.length === 0) {
    list.innerHTML = `<div class="gc-list-empty">${q ? `No matches for "${escapeHtml(q)}"` : 'No items'}</div>`;
    return;
  }

  list.innerHTML = pool.map(p => {
    const isExisting = isAddMode && c.existingMemberKeys.has(p.key);
    const checked = c.selected.has(p.key);
    // Cap logic differs by mode
    const capReached = isAddMode
      ? (existingCount + total) >= GROUP_CAP
      : total >= GROUP_CAP;
    const disabled = isExisting || (!checked && capReached);
    const onClick = isExisting ? '' : `onclick="togglePickerMember('${p.key}')"`;
    return `
      <div class="gc-list-item ${checked ? 'checked' : ''} ${disabled ? 'disabled' : ''}" ${onClick}>
        <div class="gc-list-cb">
          ${isExisting
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10" stroke-linecap="round" stroke-linejoin="round"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12" stroke-linecap="round" stroke-linejoin="round"/></svg>'}
        </div>
        <div class="avatar ${p.obj.avatarCls}">${p.obj.initials}</div>
        <div class="gc-list-info">
          <div class="gc-list-name">${escapeHtml(p.obj.name)}</div>
          <div class="gc-list-sub">${escapeHtml(p.sub)}</div>
        </div>
        ${isExisting ? '<span class="clp-existing-tag">Already in group</span>' : ''}
      </div>
    `;
  }).join('');

  // In add mode, also keep the Add button in sync
  if (isAddMode) updateAddButton();
}

function updateAddButton() {
  const btn = document.getElementById('gcCreateBtn');
  if (!btn) return;
  const count = state.groupComposer?.selected?.size || 0;
  btn.disabled = count === 0;
  btn.textContent = count === 1 ? 'Add 1 member' : `Add ${count} members`;
}

function togglePickerMember(key) {
  const c = state.groupComposer;
  // v5.23: never toggle a key that's already a group member (add-mode lock)
  if (c.mode === 'add' && c.existingMemberKeys?.has(key)) return;
  if (c.selected.has(key)) {
    c.selected.delete(key);
  } else {
    // Cap differs by mode: create = 50 selections; add = existing + selected ≤ 50
    if (c.mode === 'add') {
      const g = groupById(c.targetGroupId);
      const existingCount = g?.members.length || 0;
      if (existingCount + c.selected.size >= GROUP_CAP) {
        showToast(`This group is full. Remove someone first or create a new group.`, 'warn');
        return;
      }
    } else {
      if (c.selected.size >= GROUP_CAP) {
        showToast(`This group is full. Remove someone first or create a new group.`, 'warn');
        return;
      }
    }
    c.selected.add(key);
  }
  renderGroupPickerList();
  if (c.mode === 'add') updateAddButton();
  else updateCreateButton();
}

function onGroupNameChange() {
  updateCreateButton();
}

function updateCreateButton() {
  const name = (document.getElementById('gcName')?.value || '').trim();
  const count = state.groupComposer.selected.size;
  const btn = document.getElementById('gcCreateBtn');
  if (btn) btn.disabled = !name || count < 2;
}

function createGroupChat() {
  const name = document.getElementById('gcName').value.trim();
  if (!name) return;
  const description = document.getElementById('gcDescription').value.trim();
  const members = [...state.groupComposer.selected].map(k => {
    const [type, id] = k.split(':');
    return { type, id };
  });
  if (members.length < 2) return;
  // Auto-pick a color for the icon based on member count (deterministic-ish)
  const colors = ['color-1','color-2','color-3','color-4','color-5','color-6','color-7','color-8'];
  const newGroup = {
    id: 'g-' + Date.now(),
    name,
    description,
    iconColor: colors[(name.length + members.length) % colors.length],
    members,
    createdAt: new Date().toISOString().slice(0, 10),
    createdBy: { ...VIEWER },          // v5.22: viewer (landlord) is the creator
    endedAt: null,                     // v5.22
    endedBy: null,                     // v5.22
    pinned: false,
    archived: false,
    lastTime: 'now',
    sortKey: 0,
    unread: false,
    needsAction: false,
    lastPreview: '(No messages yet)',
  };
  GROUPS.unshift(newGroup);
  GROUP_MESSAGES[newGroup.id] = [];
  state.groupComposer.open = false;
  closeChatListPicker();      // v5.18: was closeGroupModal()
  selectGroup(newGroup.id);
  showToast(`Group "${name}" created with ${members.length} members`, 'ok');
}

// v5.10 — Toast
// ============================================================
function showToast(text, kind, opts) {
  const host = document.getElementById('toastHost');
  if (!host) return;
  const el = document.createElement('div');
  el.className = 'toast' + (kind === 'warn' ? ' warn' : '');
  const icon = kind === 'warn'
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="9" x2="12" y2="13" stroke-linecap="round"/><line x1="12" y1="17" x2="12.01" y2="17" stroke-linecap="round"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="20 6 9 17 4 12" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  const undoBtn = opts && opts.undoFn ? '<button class="toast-undo" data-undo="1">Undo</button>' : '';
  el.innerHTML = `${icon}<span>${escapeHtml(text)}</span>${undoBtn}`;
  host.appendChild(el);
  // Wire undo
  if (opts && opts.undoFn) {
    const btn = el.querySelector('[data-undo]');
    if (btn) btn.addEventListener('click', () => {
      opts.undoFn();
      el.classList.remove('show');
      setTimeout(() => el.remove(), 180);
    });
  }
  // Animate in
  requestAnimationFrame(() => el.classList.add('show'));
  // Auto-dismiss after 3s
  const dur = (opts && opts.duration) || 3000;
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 220);
  }, dur);
}

  const isExpanded = l.primary
    ? !state._collapsedLeases.has(l.id)        // primary: expanded by default unless explicitly collapsed
    : state._expandedLeases.has(l.id);         // non-primary: collapsed by default unless explicitly expanded
  const statusLbl = l.status === 'active' ? 'Active' : (l.status === 'past' ? 'Past' : 'Upcoming');
  const balanceCls = l.balanceGood === false ? 'warn' : 'good';
  const balanceText = l.balance || (l.status === 'past' ? `Ended ${l.endedOn || ''}` : (l.status === 'upcoming' ? `Starts ${l.startsOn || ''}` : ''));

  let body = '';
  if (l.status === 'active') {
    body = `

        <div class="cp-lease-row"><span class="lbl">Monthly rent</span><span class="val">${escapeHtml(l.rent || '')}</span></div>
        <div class="cp-lease-row"><span class="lbl">Balance</span><span class="val ${balanceCls}">${escapeHtml(l.balance || '')}</span></div>
      </div>
      ${l.payments && l.payments.length > 0 ? `
        <div class="cp-lease-section">
          <div class="cp-lease-section-label">Payments · last 3 months</div>
          ${l.payments.map(p => `
            <div class="cp-pay-row">
              <span class="month">
                ${escapeHtml(p.month)}
                <span class="cp-pay-pill ${p.status}">${p.status}</span>
              </span>
              <span class="cp-pay-amt ${p.status === 'overdue' ? 'warn' : ''}">${escapeHtml(p.amount)}</span>
            </div>
          `).join('')}
          <button class="cp-view-history" onclick="alert('Stub: opens full payment history.')">View payment history →</button>
        </div>
      ` : ''}
    `;
  } else if (l.status === 'past') {
    body = `
      <div class="cp-lease-section">
        <div class="cp-lease-row"><span class="lbl">Term</span><span class="val">${escapeHtml(l.term || '')}</span></div>
        <div class="cp-lease-row"><span class="lbl">Monthly rent</span><span class="val">${escapeHtml(l.rent || '')}</span></div>
        <div class="cp-lease-row"><span class="lbl">Ended on</span><span class="val">${escapeHtml(l.endedOn || '')}</span></div>
      </div>
    `;
  } else if (l.status === 'upcoming') {
    body = `
      <div class="cp-lease-section">
        <div class="cp-lease-row"><span class="lbl">Term</span><span class="val">${escapeHtml(l.term || '')}</span></div>
        <div class="cp-lease-row"><span class="lbl">Monthly rent</span><span class="val">${escapeHtml(l.rent || '')}</span></div>

      </div>
    `;
  }

  return `
    <div class="cp-lease-card ${l.status} ${isExpanded ? 'expanded' : ''}" data-lease-id="${l.id}">
      <div class="cp-lease-head" onclick="toggleLeaseExpand('${l.id}')">
        <span class="cp-lease-dot ${l.status}"></span>

// v5.14: Helper to find a lease across any tenant (works in both chat + all view contexts)
function findLeaseById(leaseId) {
  for (const t of TENANTS) {
    const l = t.leases?.find(l => l.id === leaseId);
    if (l) return { tenant: t, lease: l };
  }
  return null;
}

function toggleLeaseExpand(leaseId) {
  if (!state._expandedLeases) state._expandedLeases = new Set();
  if (!state._collapsedLeases) state._collapsedLeases = new Set();
  const found = findLeaseById(leaseId);
  if (!found) return;
  const lease = found.lease;
  // Primary: toggle the collapsed flag (default expanded)
  // Non-primary: toggle the expanded flag (default collapsed)
  if (lease.primary) {
    if (state._collapsedLeases.has(leaseId)) state._collapsedLeases.delete(leaseId);
    else state._collapsedLeases.add(leaseId);
  } else {
    if (state._expandedLeases.has(leaseId)) state._expandedLeases.delete(leaseId);
    else state._expandedLeases.add(leaseId);
  }
  // Re-derive expanded state and toggle DOM class
  const card = document.querySelector(`.cp-lease-card[data-lease-id="${leaseId}"]`);
  if (card) {
    const shouldExpand = lease.primary
      ? !state._collapsedLeases.has(leaseId)
      : state._expandedLeases.has(leaseId);
    card.classList.toggle('expanded', shouldExpand);
  }
}

function toggleLinkPopover(e, scopeId) {
  e.stopPropagation();
  const pop = document.getElementById('cpLinkPopover');
  if (!pop) return;
  const isOpen = pop.classList.contains('open');
  document.querySelectorAll('.cp-link-popover.open').forEach(p => p.classList.remove('open'));
  if (!isOpen) {
    pop.classList.add('open');
    // Dismiss on outside click
    setTimeout(() => {
      const dismiss = (ev) => {
        if (!pop.contains(ev.target)) {
          pop.classList.remove('open');
          document.removeEventListener('click', dismiss);
        }
      };
      document.addEventListener('click', dismiss);
    }, 0);
  }
}

function confirmAddMembers() {
  const c = state.groupComposer;
  const g = groupById(c.targetGroupId);
  if (!g || c.selected.size === 0) return;
  const newMembers = [...c.selected].map(k => {
    const [type, id] = k.split(':');
    return { type, id };
  });
  // Final cap check
  if (g.members.length + newMembers.length > GROUP_CAP) {
    showToast(`Cannot exceed ${GROUP_CAP} members. Remove some selections.`, 'warn');

  g.members.push(...newMembers);
  const count = newMembers.length;
  state.groupComposer.open = false;

/* ============================================================
   v5.25 — SMS WORKSPACE
   Structure mirrors Chat (list | conversation with thread/profile mode).
   Key deltas:
   - 1:1 only (no groups)
   - No toolbar on composer (just textarea + Send)
   - 3 disabled-composer states: opted-out, quiet-hours, no-phone
   - Delivery status indicators (queued / sent / delivered / failed)
   - Failed bubble: red, reason text, NO retry (per decision)
   - Picker shows disabled rows for no-phone and opted-out tenants
   - Profile: opt-in status + history (no provider number — landlord-agnostic)
   - Compliance footer auto-appended on outbound (faded inline)
   ============================================================ */

// Aggregate SMS rows by tenant — one entry per tenant who has SMS history
function getSMSByTenant() {
  const smsRows = ROWS.filter(r => r.channel === 'sms' && !r.archived);
  const byTenant = new Map();
  for (const row of smsRows) {
    const arr = byTenant.get(row.tenantId) || [];
    arr.push(row);
    byTenant.set(row.tenantId, arr);
  }
  return Array.from(byTenant.entries()).map(([tenantId, rows]) => {
    const sorted = rows.sort((a, b) => a.sortKey - b.sortKey);
    const mostRecent = sorted[0];
    const unreadCount = rows.filter(r => r.unread).length;
    return {
      tenantId,
      tenant: tenantById(tenantId),
      rows: sorted,
      mostRecent,
      sortKey: mostRecent.sortKey,
      unreadCount,
      needsAction: rows.some(r => !r.replied),
      hasFailed: rows.some(r => r.smsHasFailed),
      availability: smsAvailability(tenantId),
    };
  });
}

function renderSMSWorkspace() {
  renderSMSList();
  // v5.35: Hero-first — no auto-select
  if (state.smsSelectedTenant) {
    document.getElementById('shell').classList.add('convo-open');
    renderSMSConversation();
  } else {
    renderSMSEmptyConvoPane();
  }
}

function renderSMSList() {
  const scroll = document.getElementById('smsListScroll');
  if (!scroll) return;
  let items = getSMSByTenant();

  // Search
  const q = (state.smsSearch || '').trim().toLowerCase();
  if (q) {
    items = items.filter(it => {
      const t = it.tenant;
      const hay = [t?.name, t?.property, t?.unit, it.mostRecent.preview].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(q);
    });
  }

  // v5.26 — Apply filters
  const f = state.smsFilters;
  if (f.properties.size > 0) {
    items = items.filter(it => f.properties.has(it.tenant?.property));
  }
  if (f.statuses.has('unread')) {
    items = items.filter(it => it.unreadCount > 0);
  }
  if (f.statuses.has('archived')) {
    // For archived, query differently — include archived rows
    const archivedRows = ROWS.filter(r => r.channel === 'sms' && r.archived);
    const archivedTenants = new Set(archivedRows.map(r => r.tenantId));
    items = items.filter(it => archivedTenants.has(it.tenantId));
  }
  if (f.smsFlags.has('opted-out')) {
    items = items.filter(it => it.availability.reason === 'opted-out');
  }
  if (f.smsFlags.has('failed')) {
    items = items.filter(it => it.hasFailed);
  }
  if (f.smsFlags.has('quiet-hours')) {
    items = items.filter(it => it.availability.reason === 'quiet-hours');
  }

  // Sort (reuses global state.sort from chat — same options apply)
  const sortFn = {
    recent:   (a, b) => a.sortKey - b.sortKey,
    oldest:   (a, b) => b.sortKey - a.sortKey,
    tenant:   (a, b) => (a.tenant?.name || '').localeCompare(b.tenant?.name || '') || a.sortKey - b.sortKey,
    property: (a, b) => (a.tenant?.property || '').localeCompare(b.tenant?.property || '') || a.sortKey - b.sortKey,
  }[state.sort] || ((a, b) => a.sortKey - b.sortKey);

  items.sort(sortFn);

  // Sort label sync
  const lbl = document.getElementById('smsSortLabel');
  if (lbl) {
    const labels = { recent: 'Most Recent', oldest: 'Oldest First', tenant: 'Tenant A–Z', property: 'Property A–Z' };
    lbl.textContent = labels[state.sort] || 'Most Recent';
  }
  document.querySelectorAll('#smsSortMenu .sort-opt').forEach(b => {
    b.classList.toggle('on', b.dataset.sort === state.sort);
  });

  renderSMSActiveFilterChips();
  updateSMSFiltersBadge();

  if (items.length === 0) {
    scroll.innerHTML = `
      <div class="cl-empty">
        <div class="emo">📱</div>
        <div>${q ? `No SMS match "${escapeHtml(q)}"` : (hasAnySMSFilter() ? 'No SMS match current filters' : 'No SMS conversations yet')}</div>
      </div>
    `;
    return;
  }

  let html = '';
  if (state.smsFilters.groupBy === 'property') {
    const byProp = new Map();
    items.forEach(it => {
      const propName = (it.tenant && it.tenant.property) || 'Unknown';
      if (!byProp.has(propName)) byProp.set(propName, []);
      byProp.get(propName).push(it);
    });
    const propIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    for (const [propName, rows] of byProp) {
      html += `<div class="cl-section-header">${propIcon} ${escapeHtml(propName)} <span class="cl-section-count">(${rows.length})</span><span class="cl-section-line"></span></div>`;
      html += rows.map(renderSMSCard).join('');
    }
  } else {
    html += renderSecHead({ key: 'smsRecent', label: 'Recent', count: items.length });
    if (isSectionOpen('smsRecent')) {
      html += items.map(renderSMSCard).join('');
    }
  }
  scroll.innerHTML = html;
  syncSortByPropertyDisabledState(); // v5.32
}

function hasAnySMSFilter() {
  const f = state.smsFilters;
  return f.properties.size + f.statuses.size + f.smsFlags.size > 0 || (f.groupBy && f.groupBy !== 'none');
}

function renderSMSActiveFilterChips() {
  const wrap = document.getElementById('smsActiveFilters');
  if (!wrap) return;
  const f = state.smsFilters;
  const chips = [];
  const xSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" width="10" height="10"><line x1="18" y1="6" x2="6" y2="18" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke-linecap="round"/></svg>';

  // v5.32 — Group by chip rendered first (it shapes the whole list)
  if (f.groupBy && f.groupBy !== 'none') {
    const lbl = f.groupBy === 'property' ? 'Grouped by Property' : `Grouped by ${f.groupBy}`;
    chips.push(`<span class="filter-chip" style="background: var(--hub-accent-bg); color: var(--hub-accent); font-weight: 600;">${lbl}<button onclick="removeSMSFilter('groupBy','none')" title="Remove grouping">${xSvg}</button></span>`);
  }
  [...f.properties].forEach(p => {
    chips.push(`<span class="filter-chip">${escapeHtml(p)}<button onclick="removeSMSFilter('properties','${escapeAttr(p)}')" title="Remove">${xSvg}</button></span>`);
  });
  [...f.statuses].forEach(s => {
    const lbl = s === 'unread' ? 'Unread only' : (s === 'archived' ? 'Archived' : s);
    chips.push(`<span class="filter-chip">${escapeHtml(lbl)}<button onclick="removeSMSFilter('statuses','${s}')" title="Remove">${xSvg}</button></span>`);
  });
  [...f.smsFlags].forEach(s => {
    const lblMap = { 'opted-out': 'Opted out', 'failed': 'Failed delivery', 'quiet-hours': 'Quiet hours' };
    chips.push(`<span class="filter-chip">${escapeHtml(lblMap[s] || s)}<button onclick="removeSMSFilter('smsFlags','${s}')" title="Remove">${xSvg}</button></span>`);
  });

  if (chips.length === 0) {
    wrap.style.display = 'none';
    wrap.innerHTML = '';
    return;
  }
  wrap.style.display = 'flex';
  wrap.innerHTML = chips.join('') + `<button class="clear-all-filters" onclick="clearAllSMSFilters()">Clear all</button>`;
}

function updateSMSFiltersBadge() {
  const badge = document.getElementById('smsFiltersBadge');
  if (!badge) return;
  const f = state.smsFilters;
  const count = f.properties.size + f.statuses.size + f.smsFlags.size + (f.groupBy && f.groupBy !== 'none' ? 1 : 0); // v5.32
  badge.textContent = count;
  badge.style.display = count > 0 ? 'inline-block' : 'none';

function removeSMSFilter(kind, val) {
  // v5.32 — handle groupBy (scalar) vs set-based filters
  if (kind === 'groupBy') {

    state.smsFilters[kind].delete(val);

  state.smsFilters.properties.clear();
  state.smsFilters.statuses.clear();

function renderSMSMsg(m, isFirstOutbound) {
  if (m.who === 'in') {
    return `
      <div class="msg in">
        <div>${escapeHtml(m.text)}</div>
        <span class="time">${escapeHtml(m.time)} ago</span>
      </div>
    `;
  }
  // Outbound — status indicator + optional failure reason.
  // SMS failure is NOT retryable (carrier rejection is terminal per our decision)
  const status = m.deliveryStatus || 'delivered';
  const failClass = status === 'failed' ? 'sms-failed' : '';
  const failureReason = status === 'failed' && m.failureReason
    ? `<div class="msg-failure-reason"><div class="label">Delivery failed · no retry</div>${escapeHtml(m.failureReason)}</div>`
    : '';

  return `

/* ============================================================
   v5.29 — Shared message status renderer
   Label wrapped in .msg-status-label span → CSS controls visibility.
   aria-label preserves accessibility even when visual label is hidden.
   Read icon: eye (semantic — "seen it"), not bold-double-check.
   ============================================================ */
const MSG_STATUS_ICONS = {
  sending:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  queued:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  sent:      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><polyline points="20 6 9 17 4 12" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  delivered: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><polyline points="18 6 9 17 4 12" stroke-linecap="round" stroke-linejoin="round"/><polyline points="22 6 13 17 10 14" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  /* v5.29: Read → eye (clearer semantic than bold double-check) */
  read:      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
  failed:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12" stroke-linecap="round"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-linecap="round"/></svg>',
};
const MSG_STATUS_LABELS = {
  sending: 'Sending…', queued: 'Queued', sent: 'Sent',
  delivered: 'Delivered', read: 'Read', failed: 'Failed',
};
const MSG_STATUS_CLASS_GROUP = {
  sending: 'pending', queued: 'pending', sent: 'sent',
  delivered: 'delivered', read: 'read', failed: 'failed',
};

function renderMsgStatus(status, channel) {
  if (!status) return '';
  const icon = MSG_STATUS_ICONS[status] || '';
  const label = MSG_STATUS_LABELS[status] || status;
  const group = MSG_STATUS_CLASS_GROUP[status] || status;
  return `<span class="msg-status ${group}" aria-label="${escapeAttr(label)}">${icon}<span class="msg-status-label">${escapeHtml(label)}</span></span>`;
}

/* v5.26 — SMS segment math
   GSM-7 single segment: 160 chars
   Concatenated multi-part: 153 chars per segment (UDH overhead)
   Thresholds:
     < 160:  single segment, show "N / 160"
     ≥ 160: show "N chars · K segments"
     ≥ 4 segments (~612 chars): WARN (amber)
     ≥ 10 segments (~1530 chars): BLOCK (disable Send)
   (Unicode/UCS-2 not modeled in MVP — messages with emoji would have different thresholds)
*/
function smsSegmentInfo(text) {
  const len = text.length;
  if (len === 0) return { len: 0, segments: 0, level: 'ok' };
  const segments = len <= 160 ? 1 : Math.ceil(len / 153);
  let level = 'ok';
  if (segments >= 10) level = 'block';
  else if (segments >= 4) level = 'warn';
  return { len, segments, level };
}

function renderSMSCharCounter(text) {
  const el = document.getElementById('smsCharCounter');
  if (!el) return;
  const info = smsSegmentInfo(text);
  el.classList.remove('warn', 'block');

  if (info.len === 0) {
    el.innerHTML = '';
    return;
  }

  let countText;
  if (info.segments === 1) {
    countText = `<span class="scc-count">${info.len} / 160</span>`;
  } else {
    countText = `<span class="scc-count">${info.len} chars · ${info.segments} segments</span>`;
  }

  let warnText = '';
  if (info.level === 'warn') {
    el.classList.add('warn');
    warnText = `<span class="scc-sep">·</span><span>Long SMS — consider Chat for lengthy messages</span>`;
  } else if (info.level === 'block') {
    el.classList.add('block');
    warnText = `<span class="scc-sep">·</span><span>Too long — max 10 segments (~1,530 chars). Break into parts or use Chat.</span>`;
  }

  el.innerHTML = countText + warnText;
}

function onSMSComposerInput() {
  const ta = document.getElementById('smsComposer');
  const send = document.getElementById('smsSendBtn');
  if (!ta || !send) return;
  const text = ta.value;
  const info = smsSegmentInfo(text);
  // Disable send if empty OR over hard-block ceiling
  send.disabled = text.trim().length === 0 || info.level === 'block';
  // Auto-grow
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
  // Live char/segment counter
  renderSMSCharCounter(text);
}

function onSMSComposerKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    // Respect hard block
    const ta = document.getElementById('smsComposer');
    if (ta) {
      const info = smsSegmentInfo(ta.value);
      if (info.level === 'block') return;
    }
    sendSMSMessage();
  }
}

function sendSMSMessage() {
  const ta = document.getElementById('smsComposer');
  const text = (ta?.value || '').trim();
  if (!text) return;
  // v5.26 — hard block at 10 segments
  if (smsSegmentInfo(text).level === 'block') return;
  const tenantId = state.smsSelectedTenant;
  if (!tenantId) return;
  const avail = smsAvailability(tenantId);
  if (!avail.sendable) return;

  if (!SMS_MESSAGES[tenantId]) SMS_MESSAGES[tenantId] = [];

  // First outbound in this thread? (used for compliance footer display rule)
  const isFirstOutbound = !SMS_MESSAGES[tenantId].some(m => m.who === 'out');

  SMS_MESSAGES[tenantId].push({
    who: 'out',
    time: 'now',
    text,
    deliveryStatus: 'queued', // will progress via setTimeouts
  });

  // Update row preview
  const row = ROWS.find(r => r.channel === 'sms' && r.tenantId === tenantId && !r.archived);
  if (row) {
    row.preview = `You: ${text.length > 60 ? text.slice(0, 60) + '…' : text}`;
    row.time = 'now';
    row.sortKey = 0;
    row.replied = true;
    row.unread = false;
    row.smsHasFailed = row.smsHasFailed && SMS_MESSAGES[tenantId].some(m => m.deliveryStatus === 'failed');
  } else {
    // Create a stub row
    ROWS.unshift({
      id: 's-' + tenantId + '-' + Date.now(),
      tenantId,
      channel: 'sms',
      sortKey: 0,
      time: 'now',
      preview: `You: ${text.length > 60 ? text.slice(0, 60) + '…' : text}`,
      subject: null,
      category: 'general',
      unread: false,
      needsAction: false,
      replied: true,
    });
  }

  ta.value = '';
  renderSMSConversation();
  renderSMSList();
  updateBadge();

  // Simulated delivery progression: queued → sent (400ms) → delivered (1200ms)
  const msgs = SMS_MESSAGES[tenantId];
  const justSent = msgs[msgs.length - 1];
  setTimeout(() => {
    justSent.deliveryStatus = 'sent';
    if (state.smsSelectedTenant === tenantId) renderSMSConversation();
  }, 400);
  setTimeout(() => {
    justSent.deliveryStatus = 'delivered';
    if (state.smsSelectedTenant === tenantId) renderSMSConversation();
  }, 1400);
}

  state.smsPickerSearch = v;
  renderNewSMSPickerList();
}
function onNewSMSPickerProp(v) {
  state.smsPickerPropFilter = v;
  renderNewSMSPickerList();
}

function renderNewSMSPickerList() {
  const body = document.getElementById('smsPickerBody');
  if (!body) return;
  const q = (state.smsPickerSearch || '').trim().toLowerCase();
  const propFilter = state.smsPickerPropFilter || '';

  let tenants = TENANTS.filter(t => visibleLeases(t).length > 0);
  if (propFilter) {
    tenants = tenants.filter(t => visibleLeases(t).some(l => l.property === propFilter));
  }
  if (q) {
    tenants = tenants.filter(t => {
      const hay = [t.name, ...visibleLeases(t).map(l => `${l.property} ${l.unit}`)].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }

  if (tenants.length === 0) {
    body.innerHTML = `<div class="clp-empty">${q ? `No tenants match "${escapeHtml(q)}"` : 'No tenants available'}</div>`;
    return;
  }

  tenants.sort((a, b) => a.name.localeCompare(b.name));

  const existingSMSTenantIds = new Set(
    ROWS.filter(r => r.channel === 'sms' && !r.archived).map(r => r.tenantId)
  );

  body.innerHTML = `<div class="clp-prop-group">` + tenants.map(t => {
    const existing = existingSMSTenantIds.has(t.id);
    const leases = visibleLeases(t);
    const sub = `${tenantProperty(t)} · ${tenantUnit(t)}${leases.length > 1 ? ` · +${leases.length - 1} more` : ''}`;
    const avail = smsAvailability(t.id);
    const disabled = !avail.sendable;

    let reasonTag = '';
    if (avail.reason === 'no-phone') {
      reasonTag = '<span class="clp-row-reason muted">No phone</span>';
    } else if (avail.reason === 'opted-out') {
      reasonTag = '<span class="clp-row-reason">Opted out</span>';
    } else if (avail.reason === 'quiet-hours') {
      reasonTag = '<span class="clp-row-reason muted">Quiet hours</span>';
    } else if (existing) {
      reasonTag = '<span class="clp-existing-tag">Existing</span>';
    }

    const onclick = disabled && avail.reason !== 'quiet-hours'
      ? ''
      : `onclick="pickNewSMSTenant('${t.id}')"`;

    return `
      <div class="clp-row ${disabled && avail.reason !== 'quiet-hours' ? 'sms-disabled' : ''}" ${onclick}>
        <div class="avatar ${t.avatarCls}">${t.initials}</div>
        <div class="clp-row-info">
          <div class="clp-row-name">${escapeHtml(t.name)}</div>
          <div class="clp-row-sub">${escapeHtml(sub)}</div>
        </div>
        ${reasonTag}
      </div>
    `;
  }).join('') + `</div>`;
}

function pickNewSMSTenant(tenantId) {
  const avail = smsAvailability(tenantId);
  // no-phone and opted-out rows are rendered non-clickable; this is an extra guard
  if (avail.reason === 'no-phone' || avail.reason === 'opted-out') return;

  // Ensure there's a row so the convo pane has a selection anchor
  const existing = ROWS.find(r => r.channel === 'sms' && r.tenantId === tenantId && !r.archived);
  if (!existing) {
    ROWS.unshift({
      id: 's-' + tenantId + '-' + Date.now(),
      tenantId,
      channel: 'sms',
      sortKey: 0,
      time: 'now',
      preview: '(No messages yet)',
      subject: null,
      category: 'general',
      unread: false,
      needsAction: false,
      replied: true,
    });
    if (!SMS_MESSAGES[tenantId]) SMS_MESSAGES[tenantId] = [];
  }
  closeSMSListPicker();
  selectSMS(tenantId);
}

  if (f.statuses.has('archived')) {
    items = items.filter(t => t.archived);
  } else {
    items = items.filter(t => !t.archived);
  }
  if (f.statuses.has('unread')) items = items.filter(t => t.unread);
  if (f.statuses.has('pinned')) items = items.filter(t => state.emailPinned.has(t.id));
  if (f.statuses.has('hasAttachment')) items = items.filter(t => t.messages.some(m => m.attachments.length > 0));
  if (f.properties.size > 0) {
    items = items.filter(t => {
      const prop = emailThreadProperty(t);
      if (!prop) return f.properties.has('__none__');
      return f.properties.has(prop);
    });
  }
  if (f.categories.size > 0) {
    items = items.filter(t => f.categories.has(t.category));
  }
  if (q) {
    items = items.filter(t => {
      const hay = [
        t.subject,
        t.participants.map(p => p.name).join(' '),
        t.participants.map(p => p.email).join(' '),
        t.messages.map(m => m.body).join(' '),
      ].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }

  // Sort
  const sortFn = {
    recent:   (a, b) => a.sortKey - b.sortKey,
    oldest:   (a, b) => b.sortKey - a.sortKey,
    tenant:   (a, b) => {
      const aP = a.participants.filter(p => p.email !== 'landlord@innago.com')[0];
      const bP = b.participants.filter(p => p.email !== 'landlord@innago.com')[0];
      return (aP?.name || '').localeCompare(bP?.name || '') || a.sortKey - b.sortKey;
    },
    property: (a, b) => (emailThreadProperty(a) || '').localeCompare(emailThreadProperty(b) || '') || a.sortKey - b.sortKey,
  }[state.sort] || ((a, b) => a.sortKey - b.sortKey);
  items.sort(sortFn);
  return items;
}

function renderEmailList() {
  const scroll = document.getElementById('emailListScroll');
  if (!scroll) return;
  const items = getFilteredEmailThreads();

  // Sort label sync
  const lbl = document.getElementById('emailSortLabel');
  if (lbl) {
    const labels = { recent: 'Most Recent', oldest: 'Oldest First', tenant: 'Tenant A–Z', property: 'Property A–Z' };
    lbl.textContent = labels[state.sort] || 'Most Recent';
  }
  document.querySelectorAll('#emailSortMenu .sort-opt').forEach(b => {
    b.classList.toggle('on', b.dataset.sort === state.sort);
  });

  renderEmailActiveFilterChips();
  updateEmailFiltersBadge();

  if (items.length === 0) {
    const q = state.emailSearch;
    scroll.innerHTML = `<div class="cl-empty"><div class="emo">📧</div><div>${q ? 'No email match "'+escapeHtml(q)+'"' : (hasAnyEmailFilter() ? 'No email match current filters' : 'No email threads yet')}</div></div>`;
    return;
  }

  let html = '';
  const gb = state.emailFilters.groupBy;
  if (gb === 'category') {
    const byCat = new Map();
    items.forEach(t => { const cat = t.category || 'general'; if (!byCat.has(cat)) byCat.set(cat, []); byCat.get(cat).push(t); });
    const catLabels = { maintenance: 'Maintenance', billing: 'Billing', lease: 'Lease', moveinout: 'Move-in/out', general: 'General' };
    for (const [cat, threads] of byCat) {
      html += `<div class="cl-section-header">${catLabels[cat] || cat} <span class="cl-section-count">(${threads.length})</span><span class="cl-section-line"></span></div>`;
      html += threads.map(t => renderEmailRow(t)).join('');
    }
  } else if (gb === 'property') {
    const byProp = new Map();
    items.forEach(t => { const prop = emailThreadProperty(t) || 'No property'; if (!byProp.has(prop)) byProp.set(prop, []); byProp.get(prop).push(t); });
    const propIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    for (const [prop, threads] of byProp) {
      html += `<div class="cl-section-header">${propIcon} ${escapeHtml(prop)} <span class="cl-section-count">(${threads.length})</span><span class="cl-section-line"></span></div>`;
      html += threads.map(t => renderEmailRow(t)).join('');
    }
  } else {
    // v5.37: Pinned → Today → Recent (unified sections)
    const pinIcon = '<svg viewBox="0 0 24 24" fill="currentColor" width="11" height="11"><path d="M16 9V4l1-1H7L8 4v5l-3 3v2h6v6l1 1 1-1v-6h6v-2l-3-3z"/></svg>';
    const clockIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    const pinned = items.filter(t => state.emailPinned.has(t.id));
    const rest = items.filter(t => !state.emailPinned.has(t.id));
    if (pinned.length > 0) {
      html += renderSecHead({ key: 'emailPinned', label: 'Pinned', count: pinned.length, icon: pinIcon, variant: 'pinned' });
      if (isSectionOpen('emailPinned')) {
        html += pinned.map(t => renderEmailRow(t)).join('');
      }
    }
    // Today / Recent split
    const todayRows = rest.filter(t => isToday(t.time));
    const olderRows = rest.filter(t => !isToday(t.time));
    if (todayRows.length > 0) {
      html += renderSecHead({ key: 'emailToday', label: 'Today', count: todayRows.length, icon: clockIcon, variant: 'today' });
      if (isSectionOpen('emailToday')) {
        html += todayRows.map(t => renderEmailRow(t)).join('');
      }
    }
    if (olderRows.length > 0) {
      html += renderSecHead({ key: 'emailRecent', label: 'Recent', count: olderRows.length });
      if (isSectionOpen('emailRecent')) {
        html += olderRows.map(t => renderEmailRow(t)).join('');
      }
    }
  }
  scroll.innerHTML = html;
}

function renderEmailRow(thread) {
  const isActive = state.emailSelectedThread === thread.id && !state.emailComposerOpen;
  const isUnread = thread.unread;
  const isPinned = state.emailPinned.has(thread.id);
  const hasExt = emailThreadHasExternal(thread);
  const hasAttach = thread.messages.some(m => m.attachments.length > 0);
  const { display: senderDisplay, count: pCount } = emailParticipantSummary(thread);
  const lastMsg = thread.messages[thread.messages.length - 1];
  const snippet = lastMsg.body.substring(0, 120).replace(/\n/g, ' ');

  const attachSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>';
  const pinSvg = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 4v5l2 3v2h-5v6l-1 2-1-2v-6H6v-2l2-3V4z"/></svg>';
  const pinOutlineSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 9V4l1-1H7L8 4v5l-3 3v2h6v6l1 1 1-1v-6h6v-2l-3-3z"/></svg>';
  const archSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="21 8 21 21 3 21 3 8" stroke-linecap="round" stroke-linejoin="round"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12" stroke-linecap="round"/></svg>';

  let iconsHtml = '';
  if (hasAttach) iconsHtml += `<span class="em-icon">${attachSvg}</span>`;
  if (isPinned) iconsHtml += `<span class="em-icon pin">${pinSvg}</span>`;
  iconsHtml += `<span class="em-cat-pill ${thread.category}">${({maintenance:'Maintenance',billing:'Billing',lease:'Lease',moveinout:'Move-in/out',general:'General'})[thread.category]||thread.category}</span>`;

  return `
    <div class="email-row ${isUnread ? 'unread' : ''} ${isActive ? 'active' : ''}" data-thread="${thread.id}" onclick="selectEmailThread('${thread.id}')">
      <div class="em-unread-dot"></div>
      <div class="em-main">
        <div class="em-row-top">
          ${hasExt ? '<span class="em-ext-chip">Ext</span>' : ''}
          <span class="em-sender">${escapeHtml(senderDisplay)}</span>
          ${pCount > 2 ? `<span class="em-participant-count">${pCount}</span>` : ''}
        </div>
        <div class="em-row-bottom">
          <span class="em-subject">${escapeHtml(thread.subject)} — <span class="em-snippet">${escapeHtml(snippet)}</span></span>
        </div>
      </div>
      <div class="em-meta">
        <span class="em-time">${escapeHtml(thread.time)}</span>
        <div class="em-icons">${iconsHtml}</div>
      </div>
      <div class="em-hover-actions">
        <button class="em-hover-btn" onclick="event.stopPropagation(); archiveEmailThread('${thread.id}')" title="Archive">
          ${archSvg}
        </button>
        <button class="em-hover-btn ${isPinned ? 'pinned' : ''}" onclick="event.stopPropagation(); toggleEmailPin('${thread.id}')" title="${isPinned ? 'Unpin' : 'Pin'}">
          ${isPinned ? pinSvg : pinOutlineSvg}
        </button>
      </div>
    </div>`;
}

function renderEmailActiveFilterChips() {
  const el = document.getElementById('emailActiveFilters');
  if (!el) return;
  const f = state.emailFilters;
  const xIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="18" y1="6" x2="6" y2="18" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke-linecap="round"/></svg>';
  const chips = [];
  if (f.groupBy !== 'none') {
    const gbLabel = f.groupBy === 'category' ? 'Grouped by Category' : 'Grouped by Property';
    chips.push(`<span class="active-filter-chip" style="background: var(--hub-accent-bg); color: var(--hub-accent); font-weight: 600;">${gbLabel}<button class="xbtn" onclick="clearEmailGroupBy()">${xIcon}</button></span>`);
  }
  f.properties.forEach(p => chips.push(`<span class="active-filter-chip">${escapeHtml(p === '__none__' ? 'No property' : p)}<button class="xbtn" onclick="removeEmailFilter('property','${escapeAttr(p)}')">${xIcon}</button></span>`));
  f.categories.forEach(c => {
    const label = ({maintenance:'Maintenance',billing:'Billing',lease:'Lease',moveinout:'Move-in/out',general:'General'})[c]||c;
    chips.push(`<span class="active-filter-chip">${label}<button class="xbtn" onclick="removeEmailFilter('category','${c}')">${xIcon}</button></span>`);
  });
  f.statuses.forEach(s => {
    const label = ({unread:'Unread',archived:'Archived',pinned:'Pinned',hasAttachment:'Has attachment'})[s]||s;
    chips.push(`<span class="active-filter-chip">${label}<button class="xbtn" onclick="removeEmailFilter('status','${s}')">${xIcon}</button></span>`);
  });
  if (chips.length > 0) chips.push(`<button class="clear-all-filters" onclick="clearAllEmailFilters()">Clear all</button>`);
  el.innerHTML = chips.join('');
  el.style.display = chips.length > 0 ? 'flex' : 'none';
}

function hasAnyEmailFilter() {
  const f = state.emailFilters;
  return f.properties.size + f.categories.size + f.statuses.size > 0 || f.groupBy !== 'none';
}

function updateEmailFiltersBadge() {
  const f = state.emailFilters;
  const count = f.properties.size + f.categories.size + f.statuses.size + (f.groupBy !== 'none' ? 1 : 0);
  const badge = document.getElementById('emailFiltersBadge');
  if (badge) {
    badge.textContent = count;
    badge.style.display = count > 0 ? 'inline' : 'none';
  }
}

/* ----- Email thread/conversation pane ----- */
function renderEmailConvo() {
  const inner = document.getElementById('emailConvoInner');
  if (!inner) return;

  if (state.emailComposerOpen && state.emailComposerCtx) {
    inner.innerHTML = renderEmailComposer();
    return;
  }

  const threadId = state.emailSelectedThread;
  if (!threadId) {
    inner.innerHTML = `<div class="cv-no-selection"><div class="icon">📧</div><div class="title">Select an email thread</div><div class="sub">Pick a conversation from the left, or use the + button to compose a new email.</div></div>`;
    return;
  }

  const thread = emailThreadById(threadId);
  if (!thread) return;

  const hasExt = emailThreadHasExternal(thread);
  const extAddrs = emailThreadExternalAddresses(thread);
  const isPinned = state.emailPinned.has(thread.id);
  const catLabel = ({maintenance:'Maintenance',billing:'Billing',lease:'Lease',moveinout:'Move-in/out',general:'General'})[thread.category] || thread.category;
  const msgs = thread.messages;
  const lastMsg = msgs[msgs.length - 1];

  // Auto-expand the last message
  if (!state.emailExpandedMsgs.has(lastMsg.id)) {
    state.emailExpandedMsgs.add(lastMsg.id);
  }

  const pinSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M16 4v5l2 3v2h-5v6l-1 2-1-2v-6H6v-2l2-3V4z"/></svg>';
  const archSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="4" width="18" height="4"/><path d="M5 8v11a2 2 0 002 2h10a2 2 0 002-2V8"/><path d="M10 12h4"/></svg>';
  const unreadSvg = thread.unread
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M22 11.08V12a10 10 0 11-5.93-9.14" stroke-linecap="round" stroke-linejoin="round"/><polyline points="22 4 12 14.01 9 11.01" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    : '<svg viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="5" fill="currentColor"/></svg>';

  // External banner
  let bannerHtml = '';
  if (hasExt && !state.emailExtBannerDismissed.has(threadId)) {
    const warnSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
    bannerHtml = `<div class="et-ext-banner"><span class="bn-icon">${warnSvg}</span><div><strong>External recipients in this thread</strong> — replies go to people outside your tenant list<br>${escapeHtml(extAddrs.join(', '))}</div><button class="bn-close" onclick="dismissEmailExtBanner('${threadId}')" title="Dismiss"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`;
  }

  // Messages cascade
  let msgsHtml = '';
  for (const msg of msgs) {
    const isExpanded = state.emailExpandedMsgs.has(msg.id);
    msgsHtml += renderEmailMsgCard(msg, thread, isExpanded);
  }

  // AI suggested reply
  let aiHtml = '';
  const hasUnreplied = lastMsg.from !== 'Me' && !thread.replied;
  if (EMAIL_AI_SUGGESTIONS[threadId] && !state.emailAiDismissed.has(threadId) && hasUnreplied) {
    const sparkle = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/></svg>';
    aiHtml = `<div class="et-ai-card"><div class="et-ai-label">${sparkle} AI suggested reply</div><div class="et-ai-body">${escapeHtml(EMAIL_AI_SUGGESTIONS[threadId])}</div><div class="et-ai-actions"><button class="et-ai-btn primary" onclick="useEmailAIDraft('${threadId}')">Use draft</button><button class="et-ai-btn ghost" onclick="dismissEmailAI('${threadId}')">Dismiss</button></div></div>`;
  }

  // Action bar
  const replySvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 00-4-4H4"/></svg>';

  const fwdSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="15 17 20 12 15 7"/><path d="M4 18v-2a4 4 0 014-4h12"/></svg>';
  const actionBar = `<div class="et-action-bar"><button class="et-action-btn primary" onclick="openEmailComposer('reply','${threadId}')">${replySvg} Reply</button><button class="et-action-btn" onclick="openEmailComposer('replyAll','${threadId}')">${replyAllSvg} Reply All</button><button class="et-action-btn" onclick="openEmailComposer('forward','${threadId}')">${fwdSvg} Forward</button></div>`;

      </div>
    </div>
    ${bannerHtml}
    <div class="et-cascade" id="emailCascade">${msgsHtml}</div>
    ${aiHtml}
    ${actionBar}
  `;
}

function renderEmailMsgCard(msg, thread, isExpanded) {
  const isMe = msg.from === 'Me';
  const initial = isMe ? 'M' : msg.from.charAt(0).toUpperCase();
  const colors = ['#1E3A8A','#7C3AED','#B45309','#059669','#DB2777','#6D28D9','#DC2626'];
  const bgColor = isMe ? 'var(--hub-accent)' : colors[msg.from.length % colors.length];
  const isExt = msg.isExternal;
  const recipStr = `to ${msg.to.map(e => e === 'landlord@innago.com' ? 'me' : e.split('@')[0]).join(', ')}${msg.cc.length > 0 ? ', cc: ' + msg.cc.map(e => e.split('@')[0]).join(', ') : ''}`;

  if (!isExpanded) {
    return `
    <div class="et-msg collapsed" onclick="toggleEmailMsgExpand('${msg.id}')">
      <div class="et-msg-head">
        <div class="et-avatar ${isExt ? 'ext' : ''}" style="${!isExt ? 'background:'+bgColor : ''}">${initial}</div>
        <div class="et-msg-sender-wrap">
          <div class="et-msg-sender-line"><span class="et-msg-sender">${escapeHtml(msg.from)}</span>${isExt ? '<span class="et-msg-ext-chip">External</span>' : ''}</div>
        </div>
        <span class="et-msg-time">${escapeHtml(msg.time)}</span>
      </div>
      <div class="et-msg-preview">${escapeHtml(msg.body.substring(0, 100).replace(/\n/g,' '))}…</div>
    </div>`;
  }

  // Expanded
  let attachHtml = '';
  if (msg.attachments.length > 0) {
    const fileSvg = '<svg class="ac-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
    attachHtml = '<div class="et-attachments">' + msg.attachments.map(a => `<span class="et-attach-chip">${fileSvg} ${escapeHtml(a.name)} <span class="ac-size">${a.size}</span></span>`).join('') + '</div>';
  }

  let quoteHtml = '';
  if (msg.hasQuote) {
    const isOpen = state.emailQuoteExpanded.has(msg.id);
    quoteHtml = `<button class="et-quote-toggle" onclick="event.stopPropagation();toggleEmailQuote('${msg.id}')">···</button>`;
    if (isOpen) {
      quoteHtml += `<div class="et-quote">${escapeHtml(msg.quotedText)}</div>`;
    }
  }

  // Per-message actions (on expanded message)
  const replySvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 00-4-4H4"/></svg>';
  const replyAllSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="7 17 2 12 7 7"/><polyline points="12 17 7 12 12 7"/><path d="M22 18v-2a4 4 0 00-4-4H7"/></svg>';
  const fwdSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="15 17 20 12 15 7"/><path d="M4 18v-2a4 4 0 014-4h12"/></svg>';
  const perMsgActions = `<div style="display:flex;gap:4px;padding:6px 20px 14px;"><button class="et-action-btn" style="padding:5px 10px;font-size:11px;" onclick="event.stopPropagation();openEmailComposer('reply','${thread.id}','${msg.id}')">${replySvg} Reply</button><button class="et-action-btn" style="padding:5px 10px;font-size:11px;" onclick="event.stopPropagation();openEmailComposer('replyAll','${thread.id}','${msg.id}')">${replyAllSvg} Reply All</button><button class="et-action-btn" style="padding:5px 10px;font-size:11px;" onclick="event.stopPropagation();openEmailComposer('forward','${thread.id}','${msg.id}')">${fwdSvg} Forward</button></div>`;

  return `
    <div class="et-msg expanded">
      <div class="et-msg-head" style="cursor:pointer" onclick="toggleEmailMsgExpand('${msg.id}')">
        <div class="et-avatar ${isExt ? 'ext' : ''}" style="${!isExt ? 'background:'+bgColor : ''}">${initial}</div>
        <div class="et-msg-sender-wrap">
          <div class="et-msg-sender-line"><span class="et-msg-sender">${escapeHtml(msg.from)}</span>${isExt ? '<span class="et-msg-ext-chip">External</span>' : ''}</div>
          <div class="et-msg-recipients">${escapeHtml(recipStr)}</div>
        </div>
        <span class="et-msg-time">${escapeHtml(msg.time)}</span>
      </div>
      <div class="et-msg-body"><p>${msg.body.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</p></div>
      ${quoteHtml}
      ${attachHtml}

/* ----- Email composer (takeover) ----- */
function renderEmailComposer() {
  const ctx = state.emailComposerCtx;
  if (!ctx) return '';

  const isNew = ctx.mode === 'new';
  const isForward = ctx.mode === 'forward';
  const isReply = ctx.mode === 'reply' || ctx.mode === 'replyAll';

  // Context strip
  let stripHtml = '';
  if (isNew) {
    stripHtml = `<div class="ec-context-strip"><span class="ec-strip-title">New email</span><span class="ec-strip-sub"></span><button class="ec-strip-close" onclick="closeEmailComposer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`;
  } else {
    const verb = isForward ? 'Forwarding' : (ctx.mode === 'replyAll' ? 'Replying all' : 'Replying');
    stripHtml = `<div class="ec-context-strip"><span class="ec-strip-title">${verb}</span><span class="ec-strip-sub">${escapeHtml(ctx.subject)}</span><button class="ec-strip-close" onclick="closeEmailComposer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`;
  }

  // External warning
  let extWarnHtml = '';
  const extRecips = (ctx.to || []).filter(r => r.isExternal).concat((ctx.cc || []).filter(r => r.isExternal));
  if (extRecips.length > 0) {
    const warnSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
    extWarnHtml = `<div class="ec-ext-warn">${warnSvg} This ${isReply ? 'reply' : 'email'} will be sent to ${extRecips.length} external recipient${extRecips.length>1?'s':''}: ${escapeHtml(extRecips.map(r=>r.email).join(', '))}</div>`;
  }

  // Recipient chips
  const chipify = (recips) => recips.map(r => `<span class="ec-recip-chip ${r.isExternal ? 'ext' : ''}">${escapeHtml(r.name || r.email)} <span class="rc-x">×</span></span>`).join('');

  // Fields
  const subjectReadonly = isReply;
  const subjectValue = ctx.subject || '';
  let fieldsHtml = `<div class="ec-fields">
    <div class="ec-field"><span class="ec-field-label">To</span><div class="ec-field-value">${chipify(ctx.to || [])}<input placeholder="Add recipients…" /></div></div>
    <div class="ec-field"><span class="ec-field-label">Cc</span><div class="ec-field-value">${chipify(ctx.cc || [])}<input placeholder="Add Cc…" /></div></div>
    <div class="ec-field ${subjectReadonly ? 'readonly' : ''}"><span class="ec-field-label">Subject</span><div class="ec-field-value">${subjectReadonly ? escapeHtml(subjectValue) : '<input value="'+escapeAttr(subjectValue)+'" placeholder="Subject…" />'}</div></div>
  </div>`;

  // Toolbar
  const tb = (icon, label) => `<button class="ec-tb-btn" title="${label}">${icon}</button>`;
  const toolbarHtml = `<div class="ec-toolbar">
    ${tb('<strong>B</strong>','Bold')}${tb('<em>I</em>','Italic')}${tb('<u>U</u>','Underline')}${tb('<s>S</s>','Strikethrough')}
    <span class="ec-tb-sep"></span>
    ${tb('H₁','Heading 1')}${tb('H₂','Heading 2')}
    <span class="ec-tb-sep"></span>
    ${tb('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>','Bullet list')}
    ${tb('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="3" y="7" font-size="8" fill="currentColor">1</text><text x="3" y="13" font-size="8" fill="currentColor">2</text><text x="3" y="19" font-size="8" fill="currentColor">3</text></svg>','Numbered list')}
    ${tb('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="6" y1="3" x2="6" y2="21"/><line x1="6" y1="3" x2="18" y2="3"/><line x1="6" y1="21" x2="18" y2="21"/></svg>','Quote')}
    <span class="ec-tb-sep"></span>
    ${tb('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>','Link')}
    ${tb('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>','Image')}
    ${tb('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>','Attach file')}
    <span class="ec-tb-sep"></span>
    ${tb('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="5" y1="12" x2="19" y2="12"/></svg>','Divider')}
  </div>`;

  // Body
  const bodyPlaceholder = isNew ? 'Start writing your email…' : 'Write your reply…';
  const prefillBody = ctx.prefillBody || '';
  const bodyHtml = `<div class="ec-body-scroll"><div class="ec-body" contenteditable="true" data-placeholder="${bodyPlaceholder}">${prefillBody ? '<p>'+prefillBody.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')+'</p>' : ''}</div><div class="ec-signature">Best regards,<br>Bob (Landlord)<br>Innago Property Management</div>`;

  // Mail trail (for reply/forward)
  let trailHtml = '';
  if ((isReply || isForward) && ctx.threadId) {
    const thread = emailThreadById(ctx.threadId);
    if (thread) {
      const isOpen = isForward || state.emailTrailExpanded;
      const chevSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';
      trailHtml = `<button class="ec-trail-toggle" onclick="toggleEmailTrail()">${isOpen ? '▾' : '▸'} ${thread.messages.length} earlier message${thread.messages.length>1?'s':''}</button>`;

        }

      }

  // Actions bar

  return `<div class="email-composer">${stripHtml}${extWarnHtml}${fieldsHtml}${toolbarHtml}${bodyHtml}${trailHtml}</div>${actionsHtml}`;
}

function openEmailComposer(mode, threadId, msgId, prefillBody) {
  const ctx = { mode, threadId: threadId || null, to: [], cc: [], subject: '', prefillBody: prefillBody || '' };

  if (mode === 'new') {
    // Empty composer
  } else if (threadId) {
    const thread = emailThreadById(threadId);
    if (!thread) return;

    // Determine which message is being replied to (default: last)
    const refMsg = msgId ? thread.messages.find(m => m.id === msgId) : thread.messages[thread.messages.length - 1];
    if (!refMsg) return;

    if (mode === 'reply') {
      // Reply to sender only
      ctx.to = thread.participants.filter(p => p.email === refMsg.fromEmail).map(p => ({...p}));
      if (ctx.to.length === 0) ctx.to = [{ name: refMsg.from, email: refMsg.fromEmail, isExternal: refMsg.isExternal }];
      ctx.subject = thread.subject;
    } else if (mode === 'replyAll') {
      // All To + Cc + sender, minus self
      const allRecips = new Map();
      refMsg.to.forEach(e => { if (e !== 'landlord@innago.com') allRecips.set(e, thread.participants.find(p => p.email === e)); });
      refMsg.cc.forEach(e => { if (e !== 'landlord@innago.com') allRecips.set(e, thread.participants.find(p => p.email === e)); });
      if (refMsg.fromEmail !== 'landlord@innago.com') allRecips.set(refMsg.fromEmail, thread.participants.find(p => p.email === refMsg.fromEmail));
      ctx.to = Array.from(allRecips.values()).filter(Boolean).map(p => ({...p}));
      if (ctx.to.length === 0) ctx.to = [{ name: refMsg.from, email: refMsg.fromEmail, isExternal: refMsg.isExternal }];
      ctx.subject = thread.subject;
    } else if (mode === 'forward') {
      ctx.subject = 'Fwd: ' + thread.subject;
    }
  }

  state.emailComposerOpen = true;
  state.emailComposerCtx = ctx;
  state.emailTrailExpanded = (mode === 'forward');
  // v5.35 — close detail panel when composer takes over
  closeDetailPanel();
  // v5.36 — ensure convo pane is visible for composer
  document.getElementById('shell').classList.add('convo-open');
  renderEmailList();
  renderEmailConvo();
}

function closeEmailComposer() {
  state.emailComposerOpen = false;
  state.emailComposerCtx = null;
  state.emailTrailExpanded = false;
  // v5.36 — if no thread selected, return to hero-first
  if (!state.emailSelectedThread) {
    document.getElementById('shell').classList.remove('convo-open');
  }
  renderEmailList();
  renderEmailConvo();
}

/* ----- Drag-resize for email list ----- */
function initEmailListResizer() {
  const resizer = document.getElementById('emailListResizer');
  if (!resizer || resizer._bound) return;
  resizer._bound = true;
  const shell = document.getElementById('shell');
  const MIN_W = 240, MAX_W = 520;
  let startX, startW;

  resizer.addEventListener('mousedown', (e) => {
    e.preventDefault();
    startX = e.clientX;
    startW = state.listWidths.email;
    resizer.classList.add('dragging');
    const move = (ev) => {
      const diff = ev.clientX - startX;
      const newW = Math.min(MAX_W, Math.max(MIN_W, startW + diff));
      state.listWidths.email = newW;
      shell.style.setProperty('--email-list-w', newW + 'px');
    };
    const up = () => {
      resizer.classList.remove('dragging');
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}

  if (!tenantId) { body.innerHTML = ''; return; }
