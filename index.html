    padding: 1px 5px; border-radius: 8px; margin-left: 4px;
  }
  .gc-tab.on .badge { background: var(--hub-accent); color: #fff; }

  .gc-controls {
    display: flex; gap: 8px; margin-bottom: 10px;
  }
  .gc-prop-filter {
    flex: 1;
    border: 1px solid var(--hub-gray-200);
    border-radius: 7px;
    padding: 6px 10px;
    font-size: 12.5px; background: #fff;
    color: var(--hub-text-primary);
    cursor: pointer;
  }
  .gc-search {
    flex: 1.4;
    display: flex; align-items: center; gap: 6px;
    border: 1px solid var(--hub-gray-200);
    border-radius: 7px;
    padding: 6px 10px;
    background: #fff;
  }
  .gc-search input {
    flex: 1; border: none; outline: none; background: transparent;
    font-size: 12.5px;
  }
  .gc-search svg { width: 12px; height: 12px; color: var(--hub-text-tertiary); }

  .gc-counter {
    font-size: 11.5px; font-weight: 600;
    color: var(--hub-text-secondary);
    margin-bottom: 8px;
  }
  .gc-counter.full { color: #B45309; }

  .gc-list {
    border: 1px solid var(--hub-gray-100);
    border-radius: 8px;
    overflow: hidden;
    max-height: 280px; overflow-y: auto;
  }
  .gc-list-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--hub-gray-100);
    transition: background 100ms;
  }
  .gc-list-item:last-child { border-bottom: none; }
  .gc-list-item:hover { background: var(--hub-surface-hover); }
  .gc-list-item.checked { background: var(--hub-accent-bg); }
  .gc-list-item.disabled {
    opacity: 0.45; cursor: not-allowed;
  }
  .gc-list-item.disabled:hover { background: transparent; }
  .gc-list-cb {
    width: 16px; height: 16px;
    border: 1.5px solid var(--hub-gray-300);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 100ms;
  }
  .gc-list-item.checked .gc-list-cb {
    background: var(--hub-accent); border-color: var(--hub-accent);
  }

  /* ============================================================
     SMS WORKSPACE (v5.25)
     Own classes (sms-list / sms-convo) parallel to chat's.
     Inner elements reuse .cl-header, .cl-scroll, .cv-* — those aren't gated.
     ============================================================ */
  .shell.sms-mode {
    grid-template-columns: var(--hub-rail) 1fr 0 0;
  }
  .shell.sms-mode.convo-open {
    grid-template-columns: var(--hub-rail) var(--sms-list-w, 360px) minmax(0,1fr) 0;
  }
  .shell.sms-mode.convo-open.panel-open {
    grid-template-columns: var(--hub-rail) var(--sms-list-w, 360px) minmax(0,1fr) 320px;
  }
  .sms-list, .sms-convo { display: none; }
  .shell.sms-mode .sms-list { display: flex; }
  .shell.sms-mode .sms-convo { display: none; }
  .shell.sms-mode.convo-open .sms-convo { display: flex; }
  .shell.sms-mode .hero,
  .shell.sms-mode .drawer { display: none !important; }
  /* Base styling — parallels .chat-list / .chat-convo */
  .sms-list {
    background: var(--hub-bg-primary);
    border-right: var(--hub-border);
    flex-direction: column;
    overflow: hidden;
  }
  .sms-convo {
    background: var(--hub-bg-primary);
    flex-direction: column;
    overflow: hidden;
  }
  /* Picker overlay inside SMS list (mirrors chat-list picker-active) */
  .sms-list.picker-active > .cl-header,
  .sms-list.picker-active > .active-filters,
  .sms-list.picker-active > .cl-scroll { display: none !important; }
  .sms-list.picker-active > .cl-picker { display: flex; flex: 1 1 auto; }

  /* ============================================================
     MESSAGE STATUS INDICATORS (v5.30)
     Label visibility uses opacity + max-width (not display:none)
     so vertical height is ALWAYS preserved — no reflow on hover.
     Policy:
       - Sending/Queued: label ALWAYS visible (pending needs reassurance)
       - Failed: label ALWAYS visible (needs attention)
       - Sent/Delivered/Read: label HIDDEN by default, revealed on hover
         Hover trigger = the entire outbound bubble
     ============================================================ */
  .msg.out .msg-status {
    display: inline-flex; align-items: center; gap: 3px;
    margin-left: 6px; font-size: 10.5px;
    color: rgba(255, 255, 255, 0.70);
    vertical-align: middle;
    line-height: 14px; /* stable height so icon-only and icon+label render identically */
  }
  .msg.out .msg-status svg { width: 11px; height: 11px; flex-shrink: 0; }
  /* Label is always in DOM; visibility controlled by opacity + max-width.
     max-width transition gives smooth reveal; overflow hidden clips while collapsed. */
  .msg.out .msg-status .msg-status-label {
    display: inline-block;
    opacity: 0;
    max-width: 0;
    overflow: hidden;
    white-space: nowrap;
    vertical-align: middle;
    transition: opacity 140ms ease, max-width 140ms ease, margin-left 140ms ease;
    margin-left: 0;
  }
  /* Always-visible states: pending + failed */
  .msg.out .msg-status.pending .msg-status-label,
  .msg.out .msg-status.failed .msg-status-label {
    opacity: 1;
    max-width: 120px;
    margin-left: 3px;
  }
  /* Hover reveal on outbound bubble for settled states */
  .msg.out:hover .msg-status.sent .msg-status-label,
  .msg.out:hover .msg-status.delivered .msg-status-label,
  .msg.out:hover .msg-status.read .msg-status-label {
    opacity: 1;
    max-width: 120px;
    margin-left: 3px;
  }
  /* State colors (white shades contrast against accent-green bubble) */
  .msg.out .msg-status.pending {
    color: rgba(255, 255, 255, 0.55);
    font-style: italic;
  }
  .msg.out .msg-status.sent {
    color: rgba(255, 255, 255, 0.75);
  }
  .msg.out .msg-status.delivered {
    color: rgba(255, 255, 255, 0.90);
  }
  .msg.out .msg-status.read {
    color: #ffffff;
    font-weight: 600;
  }
  .msg.out .msg-status.failed {
    color: var(--hub-red-800);
    font-weight: 600;
  }

  /* Legacy .sms-delivery class — kept as alias for backward compatibility */
  .msg.out .sms-delivery {
    display: inline-flex; align-items: center; gap: 3px;
    margin-left: 6px; font-size: 10.5px;
    color: rgba(255, 255, 255, 0.70);
  }
  .msg.out .sms-delivery svg { width: 11px; height: 11px; }
  .msg.out .sms-delivery.sent      { color: rgba(255, 255, 255, 0.75); }
  .msg.out .sms-delivery.delivered { color: rgba(255, 255, 255, 0.90); }
  .msg.out .sms-delivery.failed    { color: var(--hub-red-800); font-weight: 600; }
  .msg.out .sms-delivery.queued    { color: rgba(255, 255, 255, 0.55); font-style: italic; }

  /* Chat retry affordance on failed outbound messages */
  .msg.out .chat-retry-link {
    display: inline-flex; align-items: center; gap: 3px;
    margin-left: 6px; font-size: 10.5px;
    color: var(--hub-red-800);

    text-decoration: underline;
    text-underline-offset: 2px;

  }
  .sms-status-badge svg { width: 9px; height: 9px; }

  /* SMS profile section — opt-in details */
  .sms-optin-card {
    margin: 10px 0 14px;
    padding: 12px 14px;
    border: var(--hub-border);
    border-radius: var(--hub-r-card);
    background: var(--hub-gray-50);
  }
  .sms-optin-card .soc-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0;
    font-size: 12px;
  }
  .sms-optin-card .soc-label {
    color: var(--hub-text-secondary); font-weight: 500;
  }
  .sms-optin-card .soc-value {
    color: var(--hub-text-primary); font-weight: 600;
  }

  /* ----- SMS picker — disabled rows ----- */
  .clp-row.sms-disabled {
    opacity: 0.55;
    cursor: not-allowed;
    background: var(--hub-gray-50);
  }
  .clp-row.sms-disabled:hover {
    background: var(--hub-gray-50);
  }
  .clp-row .clp-row-reason {
    font-size: 10.5px;
    color: var(--hub-red-800);
    font-weight: 600;
    margin-left: auto;
    padding: 2px 7px;
    border-radius: var(--hub-r-pill);
    background: var(--hub-red-50);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .clp-row .clp-row-reason.muted {
    color: var(--hub-text-secondary);
    background: var(--hub-gray-200);
  }

  /* ----- SMS char + segment counter (v5.26) ----- */
  .sms-char-counter {
    font-size: 10.5px;
    color: var(--hub-text-tertiary);
    padding-left: 4px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .sms-char-counter .scc-hint {
    color: var(--hub-text-tertiary);
  }
  .sms-char-counter .scc-count {
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .sms-char-counter.warn .scc-count {
    color: #B45309;
    font-weight: 600;
  }
  .sms-char-counter.block .scc-count {
    color: var(--hub-red-800);
    font-weight: 700;
  }
  .sms-char-counter .scc-sep {
    color: var(--hub-gray-300);
  }

  /* =========================================================
     EMAIL WORKSPACE (v5.35)
     List | Thread detail (OR composer takeover)
     Resizable list column via drag handle on the divider.
     ========================================================= */
  .shell.email-mode {
    grid-template-columns: var(--hub-rail) 1fr 0 0;
  }
  .shell.email-mode.convo-open {
    grid-template-columns: var(--hub-rail) var(--email-list-w, 360px) minmax(0,1fr) 0;
  }
  .shell.email-mode.convo-open.panel-open {
    grid-template-columns: var(--hub-rail) var(--email-list-w, 360px) minmax(0,1fr) 320px;
  }
  .shell.email-mode .hero,
  .shell.email-mode .drawer,
  .shell.email-mode .chat-list,
  .shell.email-mode .chat-convo,
  .shell.email-mode .chat-profile,
  .shell.email-mode .sms-list,
  .shell.email-mode .sms-convo { display: none !important; }
  .shell.email-mode .email-list { display: flex; }
  .shell.email-mode .email-convo { display: none; }
  .shell.email-mode.convo-open .email-convo { display: flex; }

  .email-list {
    display: none;
    background: var(--hub-bg-primary);
    border-right: var(--hub-border);
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Drag handle on list/detail divider */
  .email-list-resizer {
    position: absolute;
    top: 0; right: -3px; bottom: 0;
    width: 6px;
    cursor: col-resize;
    z-index: 10;
    background: transparent;
    transition: background 120ms;
  }
  .email-list-resizer:hover,
  .email-list-resizer.dragging {
    background: rgba(26, 82, 53, 0.12);
  }

  /* ----- Email thread row (2-line Gmail pattern) ----- */
  .email-row {
    padding: 11px 14px;
    border-bottom: var(--hub-border-light);
    display: grid;
    grid-template-columns: 10px 1fr auto;
    column-gap: 9px;
    align-items: start;
    cursor: pointer;
    position: relative;
  }
  .email-row:hover { background: var(--hub-surface-hover); }
  .email-row.active { background: var(--hub-accent-bg); }
  .email-row.active .em-subject,
  .email-row.active .em-sender { color: var(--hub-accent); }

  /* Hover-revealed pin/archive actions on email row (matches chat pattern) */
  .em-hover-actions {
    display: none;
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    gap: 2px;
    z-index: 2;
    background: inherit;
  }
  .email-row:hover .em-hover-actions { display: flex; }
  .email-row:hover .em-meta { visibility: hidden; }
  .email-row.active:hover .em-hover-actions { background: var(--hub-accent-bg); }
  .em-hover-btn {
    width: 26px; height: 26px;
    border: none; background: transparent; cursor: pointer;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--hub-text-secondary);
  }
  .em-hover-btn:hover { background: var(--hub-gray-200); color: var(--hub-text-primary); }
  .em-hover-btn.pinned { color: #B45309; display: flex; }
  .em-hover-btn.pinned:hover { color: #92400E; }
  .em-hover-btn svg { width: 14px; height: 14px; }

  .em-unread-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: transparent;
    margin-top: 7px;
    justify-self: center;
  }
  .email-row.unread .em-unread-dot { background: var(--hub-accent); }

  .em-main {
    display: flex; flex-direction: column; gap: 3px; min-width: 0;
  }
  .em-row-top {
    display: flex; align-items: center; gap: 6px; min-width: 0;
  }
  .em-ext-chip {
    font-size: 9.5px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--hub-red-50);
    color: var(--hub-red-800);
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .em-sender {
    font-size: 13px;
    font-weight: 500;
    color: var(--hub-text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .email-row.unread .em-sender { font-weight: 600; }
  .em-participant-count {
    font-size: 11px;
    color: var(--hub-text-tertiary);
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .email-row.unread .em-participant-count {
    color: var(--hub-text-secondary);
  }

  .em-row-bottom {
    display: flex; align-items: center; min-width: 0;
  }
  .em-subject {
    font-size: 12px;
    color: var(--hub-text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  /* v5.35: Hero-first — show 2 lines when list is full-width */
  .shell.email-mode:not(.convo-open) .em-subject {
    white-space: normal;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    font-size: 13px;
    line-height: 1.5;
  }
  .email-row.unread .em-subject {
    color: var(--hub-text-primary);
    font-weight: 500;
  }
  .em-snippet {
    color: var(--hub-text-tertiary);
    font-weight: 400;
  }
  .email-row.unread .em-snippet {
    color: var(--hub-text-secondary);
    font-weight: 400;
  }

  .em-meta {
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
    flex-shrink: 0;
  }
  .em-time {
    font-size: 11px; color: var(--hub-text-tertiary); white-space: nowrap;
  }
  .email-row.unread .em-time {
    color: var(--hub-accent);
    font-weight: 600;
  }
  .em-icons {
    display: flex; align-items: center; gap: 4px;
  }
  .em-icon {
    width: 13px; height: 13px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--hub-text-tertiary);
  }
  .em-icon.pin { color: #B45309; }
  .em-icon svg { width: 13px; height: 13px; }

  .em-cat-pill {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 600;
    white-space: nowrap;
  }
  .em-cat-pill.maintenance { background: var(--hub-cat-maint-bg); color: var(--hub-cat-maint-fg); }
  .em-cat-pill.billing { background: var(--hub-cat-billing-bg); color: var(--hub-cat-billing-fg); }
  .em-cat-pill.lease { background: var(--hub-cat-lease-bg); color: var(--hub-cat-lease-fg); }
  .em-cat-pill.moveinout { background: var(--hub-cat-movein-bg); color: var(--hub-cat-movein-fg); }
  .em-cat-pill.general { background: var(--hub-cat-general-bg); color: var(--hub-cat-general-fg); }

  /* ----- Email conversation pane ----- */
  .email-convo {
    display: none;
    flex-direction: column;
    background: var(--hub-bg-page);
    overflow: hidden;
  }

  /* No-selection state */
  .email-convo .cv-no-selection {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--hub-text-tertiary);
    gap: 10px;
    text-align: center;
    padding: 40px;
  }
  .email-convo .cv-no-selection .icon { font-size: 40px; opacity: 0.35; }
  .email-convo .cv-no-selection .title {
    color: var(--hub-text-secondary); font-weight: 600; font-size: 15px;
  }
  .email-convo .cv-no-selection .sub { font-size: 12px; max-width: 320px; }

  /* Thread header */
  .et-header {
    padding: 16px 22px 14px;
    background: var(--hub-bg-primary);
    border-bottom: var(--hub-border);
    display: flex; align-items: flex-start; gap: 14px; justify-content: space-between;
  }
  .et-header-main { flex: 1; min-width: 0; }
  .et-subject {
    font-size: 18px;
    font-weight: 700;
    color: var(--hub-text-primary);
    line-height: 1.3;
    margin: 0 0 4px;
  }
  .et-subject .cat-inline {
    display: inline-block;
    margin-left: 8px;
    vertical-align: middle;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .et-meta {
    font-size: 11.5px;
    color: var(--hub-text-secondary);
  }
  .et-meta .mt-sep {
    color: var(--hub-gray-300); margin: 0 6px;
  }
  .et-actions {
    display: flex; gap: 2px; flex-shrink: 0;
  }
  .et-actions .icon-btn {
    width: 32px; height: 32px;
  }
  .et-actions .icon-btn.on {
    color: #B45309;
    background: var(--hub-cat-maint-bg);
  }

  /* External banner */
  .et-ext-banner {
    padding: 10px 22px;
    background: var(--hub-red-50);
    border-bottom: 1px solid rgba(153, 27, 27, 0.12);
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 12px;
    color: var(--hub-red-800);
    line-height: 1.45;
  }
  .et-ext-banner .bn-icon {
    width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px;
  }
  .et-ext-banner .bn-icon svg { width: 14px; height: 14px; }
  .et-ext-banner strong { font-weight: 600; }
  .et-ext-banner .bn-close {
    margin-left: auto;
    background: transparent; border: none;
    color: var(--hub-red-800); opacity: 0.6;
    padding: 2px; cursor: pointer; flex-shrink: 0;
  }
  .et-ext-banner .bn-close:hover { opacity: 1; }

  /* Cascade */
  .et-cascade {
    flex: 1;
    overflow-y: auto;
    padding: 14px 22px 0;
  }

  /* Individual message */
  .et-msg {
    background: var(--hub-bg-primary);
    border: var(--hub-border);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .et-msg.collapsed { cursor: pointer; }
  .et-msg.collapsed:hover { background: var(--hub-surface-hover); }
  .et-msg-head {
    padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    min-width: 0;
  }
  .et-msg.expanded .et-msg-head {
    border-bottom: var(--hub-border-light);
  }
  .et-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    font-size: 10.5px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    flex-shrink: 0;
  }
  .et-avatar.ext {
    background: #FECACA !important;
    color: var(--hub-red-800) !important;
    border: 1px solid #F87171;
  }
  .et-msg-sender-wrap {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column; gap: 1px;
  }
  .et-msg-sender-line {
    display: flex; align-items: center; gap: 6px;
    min-width: 0;
  }
  .et-msg-sender {
    font-size: 13px;
    font-weight: 600;
    color: var(--hub-text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .et-msg-ext-chip {
    font-size: 9.5px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--hub-red-50);
    color: var(--hub-red-800);
    font-weight: 600;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }
  .et-msg-recipients {
    font-size: 11px;
    color: var(--hub-text-tertiary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .et-msg-time {
    font-size: 11px;
    color: var(--hub-text-tertiary);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .et-msg-preview {
    padding: 0 14px 10px 52px;
    font-size: 12px;
    color: var(--hub-text-tertiary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .et-msg-body {
    padding: 4px 20px 16px;
    font-size: 13.5px;
    color: var(--hub-text-primary);
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .et-msg-body p { margin: 0 0 10px; }
  .et-msg-body p:last-child { margin-bottom: 0; }

  /* Quoted trail toggle */
  .et-quote-toggle {
    margin: 6px 20px 14px;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 8px;
    background: var(--hub-gray-100);
    border: none;
    border-radius: 6px;
    font-size: 14px;
    color: var(--hub-text-secondary);
    cursor: pointer;
    line-height: 0;
    letter-spacing: 0.15em;
  }
  .et-quote-toggle:hover { background: var(--hub-gray-200); }
  .et-quote {
    margin: 0 20px 14px;
    padding-left: 10px;
    border-left: 2px solid var(--hub-gray-200);
    color: var(--hub-text-secondary);
    font-size: 12.5px;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  /* Attachments */
  .et-attachments {
    padding: 10px 20px 12px;
    display: flex; flex-wrap: wrap; gap: 8px;
    border-top: var(--hub-border-light);
    margin-top: 4px;
  }
  .et-attach-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 10px;
    background: var(--hub-gray-50);
    border: var(--hub-border);
    border-radius: 6px;
    font-size: 12px;
    color: var(--hub-text-primary);
    cursor: pointer;
    transition: background 120ms;
  }
  .et-attach-chip:hover { background: var(--hub-surface-hover); }
  .et-attach-chip .ac-ico {
    width: 14px; height: 14px; color: var(--hub-text-secondary);
  }
  .et-attach-chip .ac-size {
    font-size: 11px; color: var(--hub-text-tertiary);
  }

  /* AI suggested reply card */
  .et-ai-card {
    margin: 10px 22px 12px;
    padding: 14px 16px;
    background: var(--hub-accent-bg);
    border: 1px solid rgba(26, 82, 53, 0.18);
    border-radius: 8px;
  }
  .et-ai-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px;
    color: var(--hub-accent);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .et-ai-label svg { width: 13px; height: 13px; }
  .et-ai-body {
    font-size: 13px;
    color: var(--hub-text-primary);
    line-height: 1.55;
    margin-bottom: 10px;
    white-space: pre-wrap;
  }
  .et-ai-actions { display: flex; gap: 6px; }
  .et-ai-btn {
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 6px;
    font-weight: 600;
    border: 1px solid transparent;
    cursor: pointer;
  }
  .et-ai-btn.primary {
    background: var(--hub-accent);
    color: #fff;
  }
  .et-ai-btn.primary:hover { background: var(--hub-accent-hover); }
  .et-ai-btn.ghost {
    background: transparent;
    color: var(--hub-text-secondary);
    border-color: var(--hub-gray-300);
  }
  .et-ai-btn.ghost:hover { background: var(--hub-surface-hover); }

  /* Action bar */
  .et-action-bar {
    padding: 12px 22px 16px;
    display: flex; gap: 8px;
    background: var(--hub-bg-page);
  }
  .et-action-btn {
    padding: 8px 16px;
    border-radius: 7px;
    border: 1px solid var(--hub-gray-300);
    background: var(--hub-bg-primary);
    color: var(--hub-text-primary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background 120ms, border-color 120ms;
  }
  .et-action-btn:hover {
    background: var(--hub-surface-hover);
    border-color: var(--hub-gray-400);
  }
  .et-action-btn.primary {
    background: var(--hub-accent);
    color: #fff;
    border-color: var(--hub-accent);
  }
  .et-action-btn.primary:hover {
    background: var(--hub-accent-hover);
    border-color: var(--hub-accent-hover);
  }

  /* ==========================================================
     Email composer (takeover of detail pane)
     ========================================================== */
  .email-composer {
    flex: 1;
    display: flex; flex-direction: column;
    background: var(--hub-bg-primary);
    overflow: hidden;
  }
  .ec-context-strip {
    padding: 10px 22px;
    background: var(--hub-bg-page);
    border-bottom: var(--hub-border);
    display: flex; align-items: center; gap: 10px;
  }
  .ec-strip-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--hub-text-primary);
  }
  .ec-strip-sub {
    font-size: 12px;
    color: var(--hub-text-secondary);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ec-strip-close {
    background: transparent; border: none;
    color: var(--hub-text-secondary);
    padding: 4px;
    cursor: pointer;
    border-radius: 4px;
  }
  .ec-strip-close:hover { background: var(--hub-gray-100); color: var(--hub-text-primary); }

  /* External warning strip */
  .ec-ext-warn {
    padding: 8px 22px;
    background: #FFFBEB;
    border-bottom: 1px solid #FEF3C7;
    color: #92400E;
    font-size: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .ec-ext-warn svg { flex-shrink: 0; }

  /* Header fields */
  .ec-fields {
    padding: 0 22px;
    border-bottom: var(--hub-border-light);
  }
  .ec-field {
    display: flex; align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid var(--hub-gray-100);
    gap: 10px;
    min-height: 36px;
  }
  .ec-field:last-child { border-bottom: none; }
  .ec-field-label {
    font-size: 12px;
    color: var(--hub-text-tertiary);
    font-weight: 500;
    width: 48px;
    flex-shrink: 0;
  }
  .ec-field-value {
    flex: 1;
    font-size: 13px;
    color: var(--hub-text-primary);
    display: flex; align-items: center; flex-wrap: wrap; gap: 5px;
    min-width: 0;
  }
  .ec-field.readonly .ec-field-value {
    color: var(--hub-text-secondary);
  }
  .ec-field input {
    border: none; outline: none; background: transparent;
    font: inherit;
    color: inherit;
    flex: 1;
    min-width: 100px;
    padding: 2px 0;
  }
  .ec-recip-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px;
    background: var(--hub-gray-100);
    border-radius: 12px;
    font-size: 12px;
    color: var(--hub-text-primary);
  }
  .ec-recip-chip.ext {
    background: var(--hub-red-50);
    color: var(--hub-red-800);
    font-weight: 500;
  }
  .ec-recip-chip .rc-x {
    color: var(--hub-text-tertiary);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
  }
  .ec-recip-chip .rc-x:hover { color: var(--hub-text-primary); }
  .ec-cc-toggle {
    font-size: 11.5px;
    color: var(--hub-text-secondary);
    cursor: pointer;
    flex-shrink: 0;
  }
  .ec-cc-toggle:hover { color: var(--hub-accent); }

  /* Toolbar */
  .ec-toolbar {
    display: flex; align-items: center; gap: 3px;
    padding: 8px 22px;
    border-bottom: var(--hub-border);
    background: var(--hub-bg-primary);
    flex-wrap: wrap;
  }
  .ec-tb-btn {
    width: 28px; height: 28px;
    border-radius: 5px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--hub-text-secondary);
    font-size: 13px;
    cursor: pointer;
    border: none;
    background: transparent;
  }
  .ec-tb-btn:hover { background: var(--hub-gray-100); color: var(--hub-text-primary); }
  .ec-tb-btn.active { background: var(--hub-accent-bg); color: var(--hub-accent); }
  .ec-tb-btn svg { width: 14px; height: 14px; }
  .ec-tb-sep {
    width: 1px; height: 18px;
    background: var(--hub-gray-200);
    margin: 0 4px;
  }

  /* Editor body */
  .ec-body-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  .ec-body {
    padding: 20px 26px 8px;
    font-size: 14px;
    color: var(--hub-text-primary);
    line-height: 1.65;
    min-height: 120px;
    outline: none;
  }
  .ec-body:empty::before {
    content: attr(data-placeholder);
    color: var(--hub-text-tertiary);
    pointer-events: none;
  }
  .ec-body p { margin: 0 0 12px; }
  .ec-body p:last-child { margin-bottom: 0; }

  .ec-signature {
    padding: 8px 26px 18px;
    font-size: 13px;
    color: var(--hub-text-secondary);
    line-height: 1.5;
    white-space: pre-wrap;
  }

  /* Mail trail expand */
  .ec-trail-toggle {
    margin: 8px 26px 14px;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px;
    background: var(--hub-gray-100);
    border: none;
    border-radius: 6px;
    font-size: 12px;
    color: var(--hub-text-secondary);
    cursor: pointer;
  }
  .ec-trail-toggle:hover { background: var(--hub-gray-200); }
  .ec-trail-toggle svg { width: 12px; height: 12px; }
  .ec-trail {
    margin: 0 26px 20px;
    padding-left: 12px;
    border-left: 3px solid var(--hub-gray-200);
  }
  .ec-trail-msg {
    margin-bottom: 16px;
  }
  .ec-trail-head {
    font-size: 11.5px;
    color: var(--hub-text-secondary);
    margin-bottom: 6px;
    line-height: 1.45;
  }
  .ec-trail-head strong { color: var(--hub-text-primary); }
  .ec-trail-body {
    font-size: 13px;
    color: var(--hub-text-secondary);
    line-height: 1.55;
    white-space: pre-wrap;
  }

  /* Attachment chip bottom area */
  .ec-attachments {
    padding: 10px 22px;
    display: flex; flex-wrap: wrap; gap: 8px;
    border-top: var(--hub-border-light);
  }

  /* Bottom action bar */
  .ec-actions {
    padding: 12px 22px;
    border-top: var(--hub-border);
    background: var(--hub-bg-primary);
    display: flex; align-items: center; gap: 10px;
  }
  .ec-send-btn {
    padding: 9px 22px;
    background: var(--hub-accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .ec-send-btn:hover { background: var(--hub-accent-hover); }
  .ec-discard {
    margin-left: auto;
    font-size: 12.5px;
    color: var(--hub-text-tertiary);
    background: transparent; border: none;
    padding: 6px 10px;
    cursor: pointer;
    border-radius: 6px;
  }
  .ec-discard:hover { color: var(--hub-red-800); }

  /* Empty-thread / archive-filter affordances for email list */
  .email-list .cl-empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--hub-text-tertiary);
    font-size: 12px;
  }
  .email-list .cl-empty .emo { font-size: 32px; opacity: 0.5; margin-bottom: 8px; }

  /* =========================================================
     DETAIL PANEL (v5.35)
     Push-panel from right, 280px, squeezes conversation pane.
     Shared across Chat, SMS, Email.
     ========================================================= */
  .detail-panel {
    display: none;
    background: var(--hub-bg-primary);
    border-left: var(--hub-border);
    flex-direction: column;
    overflow-y: auto;
    min-width: 0;
    position: relative;
  }
  .shell.chat-mode.panel-open .detail-panel,
  .shell.sms-mode.panel-open .detail-panel,
  .shell.email-mode.panel-open .detail-panel {
    display: flex;
  }
  /* Hide panel in modes that don't use it */
  .shell:not(.chat-mode):not(.sms-mode):not(.email-mode) .detail-panel { display: none !important; }

  .dp-close {
    position: absolute;
    top: 6px;
    right: 6px;
    z-index: 3;
    padding: 0;
  }
  .dp-close button {
    width: 24px; height: 24px;
    border-radius: 6px;
    display: grid; place-items: center;
    color: var(--hub-text-tertiary);
  }
  .dp-close button:hover { background: var(--hub-gray-100); color: var(--hub-text-primary); }

  /* Panel body — tenant details are rendered directly */
  .dp-body {
    padding: 10px 14px 14px;
    flex: 1;
    overflow-y: auto;
  }

  /* === Comprehensive narrow-panel overrides for tenant details === */
  /* Identity row: stack vertically */
  .dp-body .cp-identity {
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 14px;
    padding: 0;
  }
  .dp-body .cp-identity-text .since {
    font-size: 11px;
  }
  .dp-body .cp-prop-pill {
    font-size: 10.5px;
    padding: 3px 8px;
  }

  /* Contact row: stack vertically */
  .dp-body .cp-contact-row {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 14px;
    padding: 0;
  }
  .dp-body .cp-contact-row a {
    font-size: 12px;
    word-break: break-all;
    gap: 6px;
  }
  .dp-body .cp-contact-row svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* Linked section */
  .dp-body .cp-links-compact {
    padding: 0;
    margin-bottom: 14px;
  }
  .dp-body .cp-section-label {
    font-size: 10.5px;
    margin-bottom: 6px;
  }
  .dp-body .cp-links-row {
    flex-wrap: wrap;
    gap: 5px;
  }
  .dp-body .cp-linked-chip-compact {
    font-size: 11px;
    padding: 4px 8px;
  }
  .dp-body .cp-add-link-btn {
    font-size: 11px;
    padding: 5px 8px;
  }

  /* Lease cards: tighter */
  .dp-body .cp-lease-card {
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .dp-body .cp-lease-head {
    padding: 9px 10px;
    gap: 7px;
  }
  .dp-body .cp-lease-title {
    font-size: 12px;
  }
  .dp-body .cp-lease-status {
    font-size: 9px;
    padding: 2px 6px;
  }
  .dp-body .cp-lease-body {
    padding: 0 10px 10px;
  }
  .dp-body .cp-lease-grid {
    gap: 6px 10px;
  }
  .dp-body .cp-lease-grid .k {
    font-size: 10.5px;
  }
  .dp-body .cp-lease-grid .v {
    font-size: 11.5px;
  }

  /* View full tenant button */
  .dp-body .chip-btn {
    font-size: 11.5px;
    padding: 7px 12px;
    margin-top: 10px;
  }

  /* Group details overrides for narrow panel */
  .dp-body .gd-hero { padding: 16px 0 14px; }
  .dp-body .gd-hero .gd-icon {
    width: 48px; height: 48px;
    font-size: 16px;
  }
  .dp-body .gd-hero .gd-name { font-size: 15px; }
  .dp-body .gd-hero .gd-count { font-size: 11px; }
  .dp-body .gd-meta-line { font-size: 11px; padding: 0 0 8px; }
  .dp-body .gd-description { font-size: 12px; margin-bottom: 12px; padding: 10px; }
  .dp-body .gd-section-title { font-size: 10px; padding: 8px 0 4px; }
  .dp-body .gd-member-row { padding: 7px 0; gap: 8px; }
  .dp-body .gd-member-row .avatar { width: 26px; height: 26px; font-size: 9px; }
  .dp-body .gd-member-name { font-size: 12px; }
  .dp-body .gd-member-sub { font-size: 10px; }
  .dp-body .gd-badge { font-size: 8.5px; padding: 1px 5px; }
  .dp-body .gd-add-row { font-size: 12px; padding: 8px 0; }
  .dp-body .gd-bottom-actions { padding: 12px 0; }
  .dp-body .gd-bottom-actions button { font-size: 12px; padding: 8px; }

  /* Email participant accordion */
  .dp-participant {
    border-bottom: var(--hub-border-light);
  }
  .dp-participant:last-child { border-bottom: none; }
  .dp-acc-head {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    cursor: pointer;
  }
  .dp-acc-head:hover { background: var(--hub-surface-hover); }
  .dp-acc-avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    font-size: 9px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    flex-shrink: 0;
  }
  .dp-acc-avatar.ext {
    background: #FECACA !important;
    color: var(--hub-red-800) !important;
    border: 1px solid #F87171;
  }
  .dp-acc-name {
    flex: 1; min-width: 0;
    font-size: 13px; font-weight: 600;
    color: var(--hub-text-primary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .dp-acc-sub {
    font-size: 11px; color: var(--hub-text-secondary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .dp-acc-badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--hub-red-50);
    color: var(--hub-red-800);
    font-weight: 600;
    flex-shrink: 0;
  }
  .dp-acc-chev {
    width: 12px; height: 12px;
    color: var(--hub-text-tertiary);
    transition: transform 150ms;
    flex-shrink: 0;
  }
  .dp-acc-chev.open { transform: rotate(180deg); }
  .dp-acc-body {
    padding: 0 14px 12px 38px;
  }
  /* External participant line (no accordion, no expand) */
  .dp-ext-line {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    border-bottom: var(--hub-border-light);
  }
  .dp-ext-line .dp-acc-avatar { width: 22px; height: 22px; font-size: 8px; }
  .dp-ext-info {
    flex: 1; min-width: 0;
  }
  .dp-ext-email {
    font-size: 12px; color: var(--hub-text-primary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* People icon button for email thread header */
  .et-people-btn svg { width: 16px; height: 16px; }

</style>
</head>
<body>

<!-- ===== Top bar ===== -->
<div class="topbar">
  <div class="brand">
    <div class="brand-mark">i</div>
    <span>Innago</span>
  </div>
  <div class="crumbs">Communication Hub · <b>v5.38 Rail icons</b></div>
  <div class="topbar-right">
    <button class="icon-btn" title="Help">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </button>
    <div class="avatar-me">BS</div>
  </div>
</div>

<!-- ===== App shell ===== -->
<div class="shell" id="shell">

  <!-- Nav rail -->
  <nav class="rail" aria-label="Channel navigation">
    <div class="rail-compose-wrap">
      <button class="rail-compose" id="composeBtn" onclick="toggleComposePopover(event)" title="New Message" aria-label="New Message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <div class="compose-popover" id="composePopover" hidden>
        <div class="popover-head">New message</div>
        <button class="popover-item" onclick="startCompose('chat')">
          <span class="pop-ic chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <div><div class="pop-title">New Chat</div><div class="pop-sub">Send an in-app message</div></div>
        </button>
        <button class="popover-item" onclick="openNewGroupChat()">
          <span class="pop-ic chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <div><div class="pop-title">New Group Chat</div><div class="pop-sub">Up to 50 tenants & staff</div></div>
        </button>
        <button class="popover-item" onclick="startCompose('sms')">
          <span class="pop-ic sms"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2h8a4 4 0 0 1 4 4v8a4 4 0 0 1-4 4h-2l-4 4v-4H8a4 4 0 0 1-4-4V6a4 4 0 0 1 4-4z" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <div><div class="pop-title">New SMS</div><div class="pop-sub">Send a text message</div></div>
        </button>
        <button class="popover-item" onclick="startComposeEmail()">
          <span class="pop-ic email"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <div><div class="pop-title">New Email</div><div class="pop-sub">Compose with full editor</div></div>
        </button>
        <div class="popover-divider"></div>
        <button class="popover-item" onclick="startCompose('announce')">
          <span class="pop-ic announce"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11v2a2 2 0 0 0 2 2h2l7 4V5L7 9H5a2 2 0 0 0-2 2z" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <div><div class="pop-title">New Announcement</div><div class="pop-sub">Broadcast to multiple tenants</div></div>
        </button>
      </div>
    </div>

    <button class="rail-item active" data-view="all" data-tip="All · Recent" onclick="switchView('all')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      <span>All</span>
      <span class="count" id="allBadge">7</span>
    </button>
    <button class="rail-item" data-view="chat" data-tip="Chat" onclick="switchView('chat')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <span>Chat</span>
      <span class="count" id="chatBadge">6</span>
    </button>
    <button class="rail-item" data-view="email" data-tip="Email" onclick="switchView('email')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Email</span>
      <span class="count" id="emailBadge">2</span>
    </button>
    <button class="rail-item" data-view="sms" data-tip="SMS" onclick="switchView('sms')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="13" y2="13"/></svg>
      <span>SMS</span>
      <span class="count" id="smsBadge">3</span>
    </button>
    <button class="rail-item" data-view="announce" data-tip="Announcements" onclick="switchView('announce')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11v2a2 2 0 0 0 2 2h2l7 4V5L7 9H5a2 2 0 0 0-2 2z"/><path d="M19 10a4 4 0 0 1 0 4"/></svg>
      <span>Announcements</span>
    </button>
    <button class="rail-item" data-view="notice" data-tip="Notices" onclick="switchView('notice')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15l2 2 4-4"/></svg>
      <span>Notices</span>
    </button>

    <div class="rail-divider"></div>

    <div class="rail-spacer"></div>

    <button class="rail-item" data-tip="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Settings</span>
    </button>
  </nav>

  <!-- HERO column -->
  <main class="hero">
    <div class="hero-head">
      <div class="hero-title-row">
        <h1 class="hero-title" id="heroTitle">All Conversations</h1>
        <span class="hero-sub" id="heroSub"></span>
      </div>
      <div class="hero-tools">
        <div class="hero-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke-linecap="round"/></svg>
          <input id="heroSearch" placeholder="Search…" oninput="onHeroSearch(this.value)" />
          <button id="heroSearchClear" onclick="clearHeroSearch()" style="display:none; background:transparent; border:none; padding:2px; cursor:pointer; color: var(--hub-text-tertiary);" title="Clear search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke-linecap="round"/></svg>
          </button>
        </div>
        <button class="chip-btn" id="filtersBtn" onclick="openFilterPanel()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Filters
          <span id="filtersBadge" style="display:none; background: var(--hub-accent); color:#fff; font-size:10px; font-weight:700; padding: 1px 6px; border-radius: 10px; margin-left: 4px;"></span>
        </button>
        <div class="sort-wrap">
          <button class="chip-btn" id="sortBtn" onclick="toggleSortMenu(event)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="21" y1="10" x2="7" y2="10" stroke-linecap="round"/><line x1="21" y1="6" x2="3" y2="6" stroke-linecap="round"/><line x1="21" y1="14" x2="3" y2="14" stroke-linecap="round"/><line x1="21" y1="18" x2="7" y2="18" stroke-linecap="round"/></svg>
            <span id="sortLabel">Most Recent</span>
          </button>
          <div class="sort-menu" id="sortMenu" hidden>
            <button class="sort-opt on" data-sort="recent" onclick="setSort('recent')">Most Recent <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span></button>
            <button class="sort-opt" data-sort="oldest" onclick="setSort('oldest')">Oldest First <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span></button>
            <button class="sort-opt" data-sort="tenant" onclick="setSort('tenant')">Tenant A–Z <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span></button>
            <button class="sort-opt" data-sort="property" onclick="setSort('property')">Property A–Z <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span></button>
          </div>
        </div>
      </div>
      <div class="active-filters" id="activeFilters" style="display:none;"></div>
    </div>
    <div class="hero-list" id="heroList"></div>
  </main>

  <!-- Drawer -->
  <aside class="drawer" id="drawer" aria-label="Context drawer" style="display:none;">
    <div id="drawerContent"></div>
  </aside>

  <!-- ============================================================

function smsAvailability(tenantId) {
  const t = tenantById(tenantId);

  if (!t.phone) return { sendable: false, reason: 'no-phone', label: 'No phone on file' };
  const p = smsProfileFor(tenantId);

  return { sendable: true, reason: null, label: 'Opted in' };
}

// Auto-icon: take first letter of first 2 significant words (skip "the", "a", etc.)
function groupIconInitials(name) {
  const skipWords = new Set(['the', 'a', 'an', 'of', 'for', 'in', 'on', 'at', '&', '·', '—']);
  const words = (name || '').split(/[\s·\-—]+/).filter(w => w && !skipWords.has(w.toLowerCase()));
  return words.slice(0, 2).map(w => w[0]?.toUpperCase() || '').join('') || '?';
}

// v5.22: Group admin/state helpers
// Owner is always admin. Creator is also admin. (App-layer rule, not vendor.)
function isGroupAdmin(group, viewer) {
  if (!group || !viewer) return false;
  if (viewer.type === 'owner') return true;
  if (group.createdBy && group.createdBy.type === viewer.type && group.createdBy.id === viewer.id) return true;
  return false;
}
function isGroupEnded(group) { return !!group?.endedAt; }
function memberKey(m) { return `${m.type}:${m.id}`; }
// Return list of admin {type, id, name} entries for display: creator + (owner if not creator)
function groupAdmins(group) {
  const list = [];
  if (group.createdBy) list.push({ ...group.createdBy, role: 'creator' });
  // Owner is always admin — represent as a separate display entity since it's implicit
  list.push({ type: 'owner', id: 'owner-self', name: 'Owner', role: 'owner' });
  return list;
}

function emailThreadById(id) { return EMAIL_THREADS.find(t => t.id === id); }

function emailParticipantSummary(thread, maxLen) {
  // Returns { display, count } — activity-ordered names, truncated
  const msgs = thread.messages;
  // Build activity order: most recent sender first
  const seen = new Set();
  const ordered = [];
  for (let i = msgs.length - 1; i >= 0; i--) {
    const name = msgs[i].from === 'Me' ? 'Me' : msgs[i].from.split(' ')[0];
    if (!seen.has(name)) { seen.add(name); ordered.push(name); }
  }
  // Add participants not yet seen (CC'd but never sent)
  for (const p of thread.participants) {
    const name = p.email === 'landlord@innago.com' ? 'Me' : p.name.split(' ')[0];
    if (!seen.has(name)) { seen.add(name); ordered.push(name); }
  }
  return { display: ordered.join(', '), count: thread.participants.length };
}

function emailThreadProperty(thread) {
  // Property association: only when ALL recipients share one property
  const props = new Set();
  for (const p of thread.participants) {
    if (p.tenantId) {
      const t = tenantById(p.tenantId);
      if (t) props.add(t.property);
    }
  }
  if (props.size === 1) return Array.from(props)[0];
  return thread.property || null; // fallback to stored
}

function emailThreadHasExternal(thread) {
  return thread.participants.some(p => p.isExternal);
}

function emailThreadExternalAddresses(thread) {
  return thread.participants.filter(p => p.isExternal).map(p => p.email);
}

function needsAction(row) {
  // TRIAGE-001 deterministic rule:
  // Needs Action = inbound from tenant, no landlord reply yet, channel is chat/sms/email
  return !row.replied && ['chat', 'sms', 'email'].includes(row.channel);
}

function applyFiltersToRows(rows) {
  const f = state.allFilters;
  const q = (state.search || '').trim().toLowerCase();
  return rows.filter(r => {
    const t = tenantById(r.tenantId);
    // Archived status: default is to HIDE archived; only include when explicitly selected
    const isArchived = r.archived === true;
    if (f.statuses.has('archived')) {
      // Show only archived
      if (!isArchived) return false;
    } else {
      // Default: hide archived
      if (isArchived) return false;
    }
    if (f.statuses.has('unread') && !r.unread) return false;
    if (f.properties.size > 0 && !f.properties.has(t?.property)) return false;
    if (f.categories.size > 0 && !f.categories.has(r.category)) return false;
    // Search: match tenant name, property, unit, preview, subject, linked label
    if (q) {
      const haystack = [
        t?.name || '',
        t?.property || '',
        t?.unit || '',
        r.preview || '',
        r.subject || '',
        r.linkedTo?.label || '',
      ].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function sortRows(rows) {
  const cmp = {
    recent:   (a, b) => a.sortKey - b.sortKey,
    oldest:   (a, b) => b.sortKey - a.sortKey,
    tenant:   (a, b) => (tenantById(a.tenantId)?.name || '').localeCompare(tenantById(b.tenantId)?.name || '') || a.sortKey - b.sortKey,
    property: (a, b) => (tenantById(a.tenantId)?.property || '').localeCompare(tenantById(b.tenantId)?.property || '') || a.sortKey - b.sortKey,
  };
  return rows.slice().sort(cmp[state.sort] || cmp.recent);
}

function renderTenantBody(tenantId) {

  const byCh = {

  const chanMeta = {
    chat:   { label: 'Chat',    icon: CHAN_ICONS.chat },
    email:  { label: 'Email',   icon: CHAN_ICONS.email },
    sms:    { label: 'SMS',     icon: CHAN_ICONS.sms },
    notice: { label: 'Notices', icon: CHAN_ICONS.notice },
  };

  const launchGroups = ['chat', 'email', 'sms', 'notice'].map(ch => {

          const subject = r.subject || (ch === 'notice' ? 'Notice' : 'Message');

            <button class="launch-card ${isCurrent ? 'current' : ''}"

              <div class="lc-top">
                <span class="lc-subject">${subject}${isCurrent ? '<span class="lc-current-tag">· CURRENT</span>' : ''}</span>
                <span class="lc-time">${r.time}</span>

        }).join('');

      <div class="tp-chan-group">
        <div class="tp-chan-label ${ch}">${meta.icon}${meta.label}</div>
        ${cards}
      </div>`;
  }).join('');

  // v5.14: All view drawer also uses the shared tenant details component, plus
  // appends the cross-channel "All conversations" launcher (unique to All).
  const launcherHtml = `
    <div style="margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--hub-gray-100);">
      <div class="cp-section-label" style="margin-bottom:10px;">All conversations</div>

function jumpToRow(rowId) {
  const row = ROWS.find(r => r.id === rowId);
  if (!row) return;
  // v5.35: Navigate to the actual channel view instead of staying in All
  if (row.channel === 'chat') {
    closeDrawer();
    switchView('chat');
    setTimeout(() => selectChat(row.tenantId), 0);
    return;
  }
  if (row.channel === 'sms') {
    closeDrawer();
    switchView('sms');
    setTimeout(() => selectSMS(row.tenantId), 0);
    return;
  }
  if (row.channel === 'email') {
    const thread = EMAIL_THREADS.find(t => t.subject === row.subject);
    if (thread) {
      closeDrawer();
      switchView('email');
      setTimeout(() => selectEmailThread(thread.id), 0);
      return;
    }
  }
  // Notice or unmapped: stay in All view (open thread in drawer)
  state.drawerMode = 'thread';
  openThread(row);
}

function renderMsg(m) {
  const refHtml = m.reference ? `
    <div class="msg-ref">
      <div class="msg-ref-label">
        ${m.reference.refType === 'announcement' ? 'In reply to announcement' : 'In reply to notice'}
      </div>
      <div class="msg-ref-title">${m.reference.refLabel}</div>
      <div class="msg-ref-body">${m.reference.refBody || ''}</div>
    </div>
  ` : '';

  // v5.28 — Chat outbound messages carry delivery/read status via CometChat receipts.
  // Inbound messages don't — status is a sender-side concept.
  // Groups are excluded (multi-recipient read semantics deferred) — signaled by m._isGroup.
  let statusHtml = '';
  let failureInline = '';
  if (m.who === 'out' && !m._isGroup) {
    const status = m.deliveryStatus || 'delivered';
    statusHtml = renderMsgStatus(status, 'chat');
    // Chat failure IS retryable (unlike SMS) — Promise reject is a local-client state
    if (status === 'failed') {
      const retryId = m._rowId || m._tenantId || '';
      failureInline = `
        <a class="chat-retry-link" onclick="retryChatMessage('${escapeAttr(retryId)}', '${escapeAttr(m._msgKey || '')}', ${m._msgIdx || 0})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="10" height="10"><polyline points="1 4 1 10 7 10" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Retry
        </a>
      `;
    }
  }

  return `
    <div class="msg ${m.who} ${m.deliveryStatus === 'failed' && m.who === 'out' ? 'sms-failed' : ''}">
      ${refHtml}
      <div>${m.text}</div>
      <span class="time">${m.time} ago${statusHtml}${failureInline}</span>
    </div>
  `;
}

/* v5.28 — chat message retry (placeholder implementation)
   Finds the failed outbound message in MESSAGES and flips its status
   back through sending → sent → delivered to simulate a retry. */
function retryChatMessage(rowId, msgKey, msgIdx) {
  if (!msgKey || !MESSAGES[msgKey]) return;
  const msg = MESSAGES[msgKey][msgIdx];
  if (!msg || msg.who !== 'out') return;
  msg.deliveryStatus = 'sending';
  renderConversation();
  setTimeout(() => { msg.deliveryStatus = 'sent'; renderConversation(); }, 300);
  setTimeout(() => { msg.deliveryStatus = 'delivered'; renderConversation(); }, 1100);
}

function openInChannel(channel, rowId) {
  const row = ROWS.find(r => r.id === rowId);
  if (!row) {
    console.warn('[openInChannel] no row found for id', rowId);
    return;
  }
  // v5.24: All → Chat navigation handoff
  if (channel === 'chat') {
    closeDrawer();
    switchView('chat');
    setTimeout(() => selectChat(row.tenantId), 0);
    return;
  }
  // v5.25: All → SMS navigation handoff
  if (channel === 'sms') {
    closeDrawer();
    switchView('sms');
    setTimeout(() => selectSMS(row.tenantId), 0);
    return;
  }
  // v5.35: All → Email navigation handoff
  if (channel === 'email') {
    const thread = EMAIL_THREADS.find(t => t.subject === row.subject);
    if (thread) {
      closeDrawer();
      switchView('email');
      setTimeout(() => selectEmailThread(thread.id), 0);
    }
    return;
  }
  // Other channels still stub
  alert(`Stub: would navigate to ${channel.toUpperCase()} view and select tenant "${tenantById(row.tenantId)?.name || row.tenantId}".`);
}

function renderAIBlock(row) {
  if (!row) return '';
  const suggestion = AI_SUGGESTIONS[row.id];
  if (!suggestion) return '';
  if (state.aiDismissed.has(row.id)) return '';
  // One-shot per session: also hide if already used (row.replied = true)
  if (row.replied) return '';

  const sparkle = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/></svg>';
  return `
    <div class="ai-block" id="aiBlock">
      <div class="ai-header">${sparkle} AI Suggested Reply</div>
      <div class="ai-body" id="aiBody">${escapeHtml(suggestion)}</div>
      <div class="ai-actions">
        <button class="ai-use" onclick="useAISuggestion('${row.id}')">Use draft</button>
        <button class="ai-dismiss" onclick="dismissAISuggestion('${row.id}')">Dismiss</button>
      </div>
    </div>
  `;
}

function useAISuggestion(rowId) {
  const suggestion = AI_SUGGESTIONS[rowId] || '';
  const textarea = document.getElementById('quickReplyInput');
  if (textarea) {
    textarea.value = suggestion;
    textarea.focus();
    // Put cursor at end
    textarea.setSelectionRange(suggestion.length, suggestion.length);
  }
  // Hide the AI block (session-sticky until replied)
  const block = document.getElementById('aiBlock');
  if (block) block.style.display = 'none';
  // Enable send button
  onReplyInput();
}

function dismissAISuggestion(rowId) {
  state.aiDismissed.add(rowId);
  const block = document.getElementById('aiBlock');
  if (block) block.style.display = 'none';
}

function onReplyInput() {
  const textarea = document.getElementById('quickReplyInput');
  const send = document.getElementById('quickReplySend');
  if (!textarea || !send) return;
  send.disabled = textarea.value.trim().length === 0;
}

function sendQuickReply(rowId) {
  const textarea = document.getElementById('quickReplyInput');
  if (!textarea || textarea.value.trim().length === 0) return;
  // Persist the typed text in MESSAGES, then trigger triage exit
  const row = ROWS.find(r => r.id === rowId);
  if (!row) return;
  const msgKey = rowId === 'c-alice-ren' ? 'alice-ren' : row.tenantId;
  if (!MESSAGES[msgKey]) MESSAGES[msgKey] = [];
  MESSAGES[msgKey].push({ who: 'out', time: 'now', text: textarea.value.trim() });
  row.replied = true;
  row.unread = false;
  updateBadge();
  renderDrawer();
  renderHero();
}

function linkEntity(rowId, entityType) {
  const row = ROWS.find(r => r.id === rowId);
  if (!row) return;
  const labels = { maintenance: 'Ticket #' + (1040 + Math.floor(Math.random()*20)), invoice: 'INV-' + (2024000 + Math.floor(Math.random()*999)), lease: 'Lease-' + row.tenantId.toUpperCase().slice(0,3) };
  row.linkedTo = { type: entityType, id: labels[entityType], label: labels[entityType] };
  renderDrawer();
  renderHero();
}

  alert(`Opens ${labels[type] || type} "${id}" in the corresponding Innago module.\n\n(One-way link — leaves the Comm Hub.)`);

function updateBadge() {

  const actionCount = ROWS.filter(r => !r.replied && ['chat','sms','email'].includes(r.channel) && !r.archived).length;

    badge.textContent = actionCount;
    badge.style.display = actionCount > 0 ? 'grid' : 'none';

  // Chat badge: Needs Action count within chat (matches All semantic)
  const chatCount = ROWS.filter(r => !r.replied && r.channel === 'chat' && !r.archived).length;
  const chatBadge = document.getElementById('chatBadge');
  if (chatBadge) {
    chatBadge.textContent = chatCount;
    chatBadge.style.display = chatCount > 0 ? 'grid' : 'none';
  }
  // Email badge: Needs Action count within email
  const emailCount = ROWS.filter(r => !r.replied && r.channel === 'email' && !r.archived).length;
  const emailBadge = document.getElementById('emailBadge');
  if (emailBadge) {
    emailBadge.textContent = emailCount;
    emailBadge.style.display = emailCount > 0 ? 'grid' : 'none';
  }
  // v5.25: SMS badge: Needs Action count within SMS
  const smsCount = ROWS.filter(r => !r.replied && r.channel === 'sms' && !r.archived).length;
  const smsBadge = document.getElementById('smsBadge');
  if (smsBadge) {

    smsBadge.style.display = smsCount > 0 ? 'grid' : 'none';

/* v5.34 — currentFilters() routes to the per-view filter bucket.
   All / Chat / SMS each have their own. SMS path is unchanged (its own panel functions). */
function currentFilters() {
  if (state.view === 'chat') return state.chatFilters;
  return state.allFilters;
}

/* v5.33 — per-view groupBy helpers. State is split so All ↔ Chat don't leak.
   SMS groupBy lives in state.smsFilters.groupBy (unchanged, already isolated). */
function groupByForView() {
  if (state.view === 'chat') return state.chatGroupBy || 'none';
  return state.allGroupBy || 'none';
}
function setGroupByForView(val) {
  if (state.view === 'chat') state.chatGroupBy = val;
  else state.allGroupBy = val;
}

function clonePendingFilters() {
  const f = currentFilters();
  return {
    properties: new Set(f.properties),
    categories: new Set(f.categories),
    statuses:   new Set(f.statuses),
    groupBy:    groupByForView(),
    propSearch: '',
    collapsed:  new Set(pendingFilters?.collapsed || []),
  };
}
function openFilterPanel() {
  pendingFilters = clonePendingFilters();
  renderFilterPanel();
  document.getElementById('filterPanel').classList.add('open');
  document.getElementById('filterBackdrop').classList.add('open');
}
function closeFilterPanel() {
  document.getElementById('filterPanel').classList.remove('open');
  document.getElementById('filterBackdrop').classList.remove('open');
  pendingFilters = null;
  smsPendingFilters = null;
  emailPendingFilters = null;
}
function applyFilters() {
  // v5.26 — route to SMS if SMS panel is active
  if (smsPendingFilters) { applySMSFilters(); return; }
  // v5.35 — route to Email if email panel is active
  if (emailPendingFilters) { emailApplyFilters(); return; }
  if (!pendingFilters) return;

function escapeAttr(s) { return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* v5.37: Shared section header renderer — Outlook-style left chevron, whole-row clickable */
const SEC_CHEVRON = '<svg class="sec-head-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><polyline points="6 9 12 15 18 9" stroke-linecap="round" stroke-linejoin="round"/></svg>';
function renderSecHead(opts) {
  const { key, label, count, icon, variant, collapsible } = opts;
  const isCollapsed = collapsible !== false && state.sectionCollapsed[key];
  const chevCls = isCollapsed ? 'collapsed' : '';
  const variantCls = variant || '';
  const iconHtml = icon || '';
  const countHtml = count != null ? `<span class="sec-head-count">${count}</span>` : '';
  const clickAttr = collapsible !== false ? `onclick="toggleSection('${key}')"` : '';
  return `<div class="sec-head ${variantCls}" ${clickAttr}>
    <svg class="sec-head-chev ${chevCls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><polyline points="6 9 12 15 18 9" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="sec-head-label">${iconHtml}${escapeHtml(label)}</span>
    ${countHtml}
    <span class="sec-head-line"></span>
  </div>`;
}
function toggleSection(key) {
  state.sectionCollapsed[key] = !state.sectionCollapsed[key];
  // Re-render the current view's list
  if (state.view === 'all') renderHero();
  else if (state.view === 'chat') renderChatList();
  else if (state.view === 'sms') renderSMSList();
  else if (state.view === 'email') renderEmailList();
}
function isSectionOpen(key) {
  return !state.sectionCollapsed[key];
}
function isToday(timeStr) {
  // Prototype heuristic: "Xm" or "Xh" = today; "Xd"+ = earlier
  if (!timeStr) return false;
  const t = timeStr.trim().toLowerCase();
  return t.endsWith('m') || t.endsWith('h') || t === 'now' || t.includes('min') || t.includes('hour');
}

function switchView(view) {
  state.view = view;
  document.querySelectorAll('.rail-item').forEach(b => b.classList.remove('active'));
  const active = document.querySelector(`.rail-item[data-view="${view}"]`);
  if (active) active.classList.add('active');

  const shell = document.getElementById('shell');

  // Close any open All-view drawer when leaving All
  if (view !== 'all' && state.drawerMode) {
    state.selectedRowId = null;
    state.selectedTenantId = null;
    setShellDrawerOpen(false);
  }

  // v5.35 — Close detail panel and convo on view switch
  closeDetailPanel();
  shell.classList.remove('convo-open');

  // Toggle chat workspace mode on the shell
  if (view === 'chat') {
    shell.classList.remove('sms-mode');
    shell.classList.remove('email-mode');
    shell.classList.add('chat-mode');
    shell.style.setProperty('--chat-list-w', state.listWidths.chat + 'px');
    if (state.chatSelectedTenant || state.chatSelectedGroup) shell.classList.add('convo-open');
    renderChatWorkspace();
    initChatListResizer();
    return;
  }

  // v5.25 — Toggle SMS workspace mode on the shell
  if (view === 'sms') {
    shell.classList.remove('chat-mode');
    shell.classList.remove('email-mode');
    shell.classList.add('sms-mode');
    shell.style.setProperty('--sms-list-w', state.listWidths.sms + 'px');
    if (state.smsSelectedTenant) shell.classList.add('convo-open');
    renderSMSWorkspace();
    initSMSListResizer();
    return;
  }

  // v5.35 — Toggle Email workspace mode on the shell
  if (view === 'email') {
    shell.classList.remove('chat-mode');
    shell.classList.remove('sms-mode');
    shell.classList.add('email-mode');
    shell.style.setProperty('--email-list-w', state.listWidths.email + 'px');
    if (state.emailSelectedThread || state.emailComposerOpen) shell.classList.add('convo-open');
    renderEmailWorkspace();
    return;
  }

  shell.classList.remove('chat-mode');
  shell.classList.remove('sms-mode');
  shell.classList.remove('email-mode');

  const titleMap = {
    all:      ['All Conversations', ''],
    email:    ['Email', ''],
    announce: ['Announcements', ''],
    notice:   ['Notices', ''],
  };
  const [title, sub] = titleMap[view] || titleMap.all;
  document.getElementById('heroTitle').textContent = title;
  document.getElementById('heroSub').textContent = sub;

  if (view === 'all') {
    renderHero();
  } else {
    // For non-Chat / non-SMS / non-All views, show a stub for now — full spec is per-view
    const list = document.getElementById('heroList');
    list.innerHTML = `
      <div class="empty-hero">
        <div style="font-size:40px; margin-bottom:12px; opacity:0.3;">📭</div>
        <div style="font-weight:600; color:var(--hub-text-primary); margin-bottom:6px;">${title} view</div>
        <div style="font-size:12px;">Per-view design pending.</div>
        <div style="margin-top:18px;"><button class="chip-btn" onclick="switchView('all')">Back to All</button></div>
      </div>
    `;
  }
}

// Aggregate chat ROWS by tenant — one entry per tenant who has chat history
function getChatsByTenant() {
  const chatRows = ROWS.filter(r => r.channel === 'chat' && !r.archived);
  const byTenant = new Map();
  for (const row of chatRows) {
    const arr = byTenant.get(row.tenantId) || [];
    arr.push(row);
    byTenant.set(row.tenantId, arr);
  }
  return Array.from(byTenant.entries()).map(([tenantId, rows]) => {
    rows.sort((a, b) => a.sortKey - b.sortKey); // most recent first
    const mostRecent = rows[0];
    const unreadCount = rows.filter(r => r.unread).length;
    const needsAction = rows.some(r => !r.replied);
    // Pull a "linked" hint for the card (use the most recent linked row, if any)
    const linkedRow = rows.find(r => r.linkedTo);
    return {
      tenantId,
      tenant: tenantById(tenantId),
      mostRecent,
      rows,
      unreadCount,
      needsAction,
      linkedTo: linkedRow?.linkedTo || null,
      sortKey: mostRecent.sortKey,
      pinned: state.pinnedChats.has(tenantId),
    };
  });
}

function renderChatWorkspace() {
  renderChatList();
  // v5.35: Hero-first — no auto-select. User clicks a card to open convo.
  // If a conversation was already selected (returning to chat view), render it.
  if (state.chatSelectedTenant || state.chatSelectedGroup) {
    document.getElementById('shell').classList.add('convo-open');
    renderConversation();
  } else {
    renderChatEmptyConvo();
  }
}

// Returns mixed list of 1:1 chats and groups, normalized for rendering
function getAllChatListItems() {
  const oneToOne = getChatsByTenant().map(c => ({
    kind: 'tenant',
    id: c.tenantId,
    tenantId: c.tenantId,
    sortKey: c.sortKey,
    pinned: c.pinned,
    unreadCount: c.unreadCount,
    needsAction: c.needsAction,
    _data: c,
  }));
  const groups = GROUPS.filter(g => !g.archived).map(g => ({
    kind: 'group',
    id: g.id,
    sortKey: g.sortKey,
    pinned: state.pinnedChats.has(g.id),    // v5.14: single source of truth (was g.pinned || ...)
    unreadCount: g.unread ? 1 : 0,
    unread: g.unread,
    needsAction: g.needsAction,
    _data: g,
  }));
  return [...oneToOne, ...groups];
}

// v5.14: Helpers for chat list sort
function chatItemName(it) {
  if (it.kind === 'tenant') return tenantById(it.tenantId)?.name || '';
  return it._data.name || '';
}
function chatItemProperty(it) {
  if (it.kind === 'tenant') return tenantById(it.tenantId)?.property || '';
  // For groups, sort to bottom of property sort by using a high-collation prefix
  return '~' + (it._data.name || '');
}

function renderChatList() {
  const scroll = document.getElementById('chatListScroll');
  if (!scroll) return;
  let items = getAllChatListItems();

  // Apply search
  const q = (state.chatSearch || '').trim().toLowerCase();
  if (q) {
    items = items.filter(it => {
      if (it.kind === 'tenant') {
        const t = it._data.tenant;
        const hay = [t?.name, t?.property, t?.unit, it._data.mostRecent.preview]
          .filter(Boolean).join(' ').toLowerCase();
        return hay.includes(q);
      } else {
        const g = it._data;
        return [g.name, g.lastPreview].join(' ').toLowerCase().includes(q);
      }
    });
  }

  // Apply Properties + Status filters
  const f = state.chatFilters;
  if (f.properties.size > 0) {
    items = items.filter(it => {
      if (it.kind === 'tenant') return f.properties.has(it._data.tenant?.property);
      // group: include if any member is in a selected property
      return it._data.members.some(m => {
        const obj = memberById(m);
        return obj && f.properties.has(obj.property);
      });
    });
  }
  if (f.statuses.has('unread')) {
    items = items.filter(it => it.unreadCount > 0 || it.unread);
  }

  // Split: pinned vs recent — apply global state.sort (matches All view options)
  const sortFn = {
    recent:   (a, b) => a.sortKey - b.sortKey,
    oldest:   (a, b) => b.sortKey - a.sortKey,
    tenant:   (a, b) => chatItemName(a).localeCompare(chatItemName(b)) || a.sortKey - b.sortKey,
    property: (a, b) => chatItemProperty(a).localeCompare(chatItemProperty(b)) || a.sortKey - b.sortKey,
  }[state.sort] || ((a, b) => a.sortKey - b.sortKey);
  const pinned = items.filter(it => it.pinned).sort(sortFn);
  const recent = items.filter(it => !it.pinned).sort(sortFn);

  // Sync sort label + active filter chips
  syncSortLabels();
  renderChatActiveFilterChips();

  // Update selection bar count + button labels
  updateSelectionBarUI();

  if (items.length === 0) {
    scroll.innerHTML = `
      <div class="cl-empty">
        <div class="emo">💬</div>
        <div>${q ? `No chats match "${escapeHtml(q)}"` : 'No chats to show'}</div>
      </div>
    `;
    updateChatFiltersBadge();
    return;
  }

  let html = '';
  const pinIcon = '<svg viewBox="0 0 24 24" fill="currentColor" width="11" height="11"><path d="M16 9V4l1-1H7L8 4v5l-3 3v2h6v6l1 1 1-1v-6h6v-2l-3-3z"/></svg>';
  if (pinned.length > 0) {
    html += renderSecHead({ key: 'chatPinned', label: 'Pinned', count: pinned.length, icon: pinIcon, variant: 'pinned' });
    if (isSectionOpen('chatPinned')) {
      html += pinned.map(renderListItem).join('');
    }
  }
  if (recent.length > 0) {
    if (state.chatGroupBy === 'property') {
      const groupKind = recent.filter(it => it.kind === 'group');
      const tenantKind = recent.filter(it => it.kind !== 'group');
      if (groupKind.length > 0) {
        html += `<div class="cl-section-header">Groups <span class="cl-section-count">(${groupKind.length})</span><span class="cl-section-line"></span></div>`;
        html += groupKind.map(renderListItem).join('');
      }
      const byProp = new Map();
      tenantKind.forEach(it => {
        const t = it._data && it._data.tenant;
        const propName = (t && t.property) || 'Unknown';
        if (!byProp.has(propName)) byProp.set(propName, []);
        byProp.get(propName).push(it);
      });
      const propIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      for (const [propName, items] of byProp) {
        html += `<div class="cl-section-header">${propIcon} ${escapeHtml(propName)} <span class="cl-section-count">(${items.length})</span><span class="cl-section-line"></span></div>`;
        html += items.map(renderListItem).join('');
      }
    } else {
      html += renderSecHead({ key: 'chatRecent', label: 'Recent', count: recent.length });
      if (isSectionOpen('chatRecent')) {
        html += recent.map(renderListItem).join('');
      }
    }
  }
  scroll.innerHTML = html;
  updateChatFiltersBadge();

  // Toggle .selecting class
  document.getElementById('chatList').classList.toggle('selecting', state.selecting);
  syncSortByPropertyDisabledState(); // v5.32
}

function onChatCardClick(e, kind, id) {
  // In selection mode, click toggles checkbox; otherwise selects the chat
  if (state.selecting) {
    toggleSelectionForCard(kind, id);
    return;
  }
  if (kind === 'group') selectGroup(id);
  else selectChat(id);
}

function selectChat(tenantId) {
  state.chatSelectedTenant = tenantId;
  state.chatSelectedGroup = null;
  state.chatConvoMode = 'thread';
  ROWS.filter(r => r.channel === 'chat' && r.tenantId === tenantId).forEach(r => r.unread = false);
  document.getElementById('shell').classList.add('convo-open');
  renderChatList();
  renderConversation();
  updateBadge();
  if (state.detailPanelOpen) renderDetailPanel();
}

function selectGroup(groupId) {
  state.chatSelectedGroup = groupId;
  state.chatSelectedTenant = null;
  state.chatConvoMode = 'thread';
  const g = groupById(groupId);
  if (g) g.unread = false;
  document.getElementById('shell').classList.add('convo-open');
  renderChatList();
  renderConversation();
  if (state.detailPanelOpen) renderDetailPanel();
}

function togglePinChat(tenantId) {
  if (state.pinnedChats.has(tenantId)) {
    state.pinnedChats.delete(tenantId);
  } else {
    if (state.pinnedChats.size >= PIN_CAP) return; // silent — disabled state shows tooltip
    state.pinnedChats.add(tenantId);
  }
  renderChatList();
}

function toggleChatPinnedCollapse() {
  state.chatPinnedCollapsed = !state.chatPinnedCollapsed;
  renderChatList();
}

function onChatSearch(val) {
  state.chatSearch = val;
  renderChatList();
}

function updateChatFiltersBadge() {
  const badge = document.getElementById('chatFiltersBadge');
  if (!badge) return;
  // Reuse hasActiveFilters() but only count properties + statuses (chat ignores categories)
  const f = state.chatFilters;
  const count = f.properties.size + (f.statuses.has('unread') ? 1 : 0) + (state.chatGroupBy && state.chatGroupBy !== 'none' ? 1 : 0); // v5.34
  badge.textContent = count;
  badge.style.display = count > 0 ? 'inline-block' : 'none';
}

// Get all chat messages for a tenant (combines split message keys e.g. alice + alice-ren)
function getChatMessagesForTenant(tenantId) {
  const chatRowsForTenant = ROWS.filter(r => r.channel === 'chat' && r.tenantId === tenantId);
  const allMsgs = [];
  chatRowsForTenant.forEach(row => {
    const msgKey = row.id === 'c-alice-ren' ? 'alice-ren' : tenantId;
    const msgs = MESSAGES[msgKey] || [];
    msgs.forEach((m, idx) => allMsgs.push({ ...m, _rowId: row.id, _tenantId: tenantId, _msgKey: msgKey, _msgIdx: idx }));
  });
  return allMsgs;
}
